<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sue's Trip</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sue's Trip">
    <link rel="apple-touch-icon" href="https://i.imgur.com/妳的正確圖片ID.png">
    <link rel="icon" href="https://i.imgur.com/妳的正確圖片ID.png">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        #index-page, #trip-container { padding: 20px; padding-bottom: 100px; }
        .trip-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 0.75rem; color: #999; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .main-tab-content { display: none; }
        .main-tab-content.active { display: block; }
        .date-tabs { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; }
        .date-tab { min-width: 60px; text-align: center; padding: 10px; background: #fff; border-radius: 12px; border: 1px solid #eee; }
        .date-tab.active { background: var(--accent-color); color: #fff; }
        .timeline-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; gap: 10px; position: relative; }
        
        /* 加大輸入框尺寸 */
        input[type="text"], input[type="number"], select { flex: 1; padding: 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; min-height: 50px; }
        .add-btn { background: var(--accent-color); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; min-height: 50px; font-size: 16px; }
        
        /* Checkbox 比例修正：同一行且大小適中 */
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .list-row span { display: flex; align-items: center; flex: 1; font-size: 16px; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; flex-shrink: 0; }
        
        .sync-indicator { font-size: 10px; color: #bbb; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="index-page">
    <h1 style="font-size: 1.8rem;">✈️ 我的紐約旅程</h1>
    <div class="sync-indicator" id="sync-status">雲端同步中...</div>
    <div id="trip-list"></div>
</div>

<div id="trip-container" style="display:none;">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div><h1 id="top-title" style="margin:0; font-size:1.2rem;"></h1></div>
        <button onclick="goHome()" style="background:none; border:1px solid #ddd; padding:5px 10px; border-radius:20px;">返回</button>
    </header>

    <div id="tab-itinerary" class="main-tab-content active">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div id="itinerary-list"></div>
    </div>

    <div id="tab-expenses" class="main-tab-content">
        <h3>💰 旅途記帳 (跨裝置同步)</h3>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" id="exp-name" placeholder="項目...">
            <div style="display:flex; gap:10px;">
                <input type="number" id="exp-amount" placeholder="金額 (USD)">
                <button class="add-btn" onclick="addExpense()">新增</button>
            </div>
        </div>
        <div id="expense-list-container" style="margin-top:20px;"></div>
    </div>

    <div id="tab-lists" class="main-tab-content">
        <h3>🛒 採買清單</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="shop-input" placeholder="想買什麼？">
            <button class="add-btn" onclick="addListObj('shopping', 'shop-input')">新增</button>
        </div>
        <div id="shopping-list-container"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)">📍行程</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)">💰記帳</div>
        <div class="nav-item" onclick="switchMainTab('tab-lists', this)">🛒清單</div>
    </nav>
</div>

<script>
    let appData = {
        trips: [{ title: '🇺🇸 紐約春季之旅 2026', startDate: '2026-04-20' }],
        expenses: [], shopping: [], 
        itineraries: {
            // 預設行程內容 (略，同之前版本，含 Tony's 18:00)
            4: [{ time: '18:00', title: '🍝 Dinner: Tony\'s Di Napoli', loc: '147 W 43rd St' }],
            // ... 其餘行程 ...
        }
    };

    // ✨ 雲端同步核心：存檔
    async function saveData() {
        document.getElementById('sync-status').innerText = "同步中...";
        try {
            await fetch('/api/db', {
                method: 'POST',
                body: JSON.stringify(appData)
            });
            document.getElementById('sync-status').innerText = "雲端已同步 ✓";
        } catch (e) {
            document.getElementById('sync-status').innerText = "同步失敗 (離線中)";
        }
    }

    // ✨ 雲端同步核心：讀檔
    async function loadData() {
        try {
            const res = await fetch('/api/db');
            const cloudData = await res.json();
            if (cloudData) {
                appData = cloudData;
                console.log("已載入雲端最新資料");
            }
        } catch (e) {
            console.log("無法連線雲端，使用預設值");
        }
        renderTrips();
        document.getElementById('sync-status').innerText = "雲端已同步 ✓";
    }

    // 介面渲染邏輯 (簡化，確保呼叫 saveData)
    function renderExpenses() {
        const cont = document.getElementById('expense-list-container');
        cont.innerHTML = appData.expenses.map((e, i) => `<div class="list-row"><span>${e.name}</span><span>$${e.amt}</span></div>`).join('');
    }

    async function addExpense() {
        const n = document.getElementById('exp-name'), a = document.getElementById('exp-amount');
        if(!n.value || !a.value) return;
        appData.expenses.push({ name: n.value, amt: parseFloat(a.value) });
        n.value = ''; a.value = '';
        renderExpenses();
        await saveData(); // 存入雲端
    }

    async function addListObj(type, inputId) {
        const v = document.getElementById(inputId);
        if(!v.value) return;
        appData[type].push({ text: v.value, checked: false });
        v.value = '';
        renderLists();
        await saveData(); // 存入雲端
    }

    function renderTrips() {
        const list = document.getElementById('trip-list');
        list.innerHTML = appData.trips.map(t => `<div class="trip-card" onclick="openTrip()">${t.title} ❯</div>`).join('');
    }

    function openTrip() {
        document.getElementById('index-page').style.display = 'none';
        document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = appData.trips[0].title;
    }

    function switchMainTab(id, el) {
        document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = loadData;
</script>
</body>
</html>
