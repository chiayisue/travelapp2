<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Travel App 11.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --danger-color: #ff4d4f; }
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Noto Sans TC", sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overscroll-behavior-y: none; }
        #index-page { padding: 20px; display: block; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; }
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; cursor: pointer; position: relative; display: flex; justify-content: space-between; align-items: center;}
        .trip-info h2 { margin: 0 0 8px 0; font-size: 1.3rem; }
        .trip-info p { margin: 0; color: #888; font-size: 0.85rem; font-weight: bold; }
        .delete-btn { color: #d1c9c0; background: none; border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; transition: color 0.2s, transform 0.1s; }
        .delete-btn:active { color: var(--danger-color); transform: scale(0.9); }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--accent-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 4px 15px rgba(140, 123, 108, 0.4); z-index: 100; cursor: pointer;}
        #add-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: flex-end; }
        .modal-content { background: var(--bg-color); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px 40px 20px; box-sizing: border-box; }
        .input-group-modal { margin-bottom: 15px; }
        .input-group-modal label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        .modal-content input { width: 100%; padding: 12px; border: 1px solid var(--light-gray); border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-manual { width: 100%; padding: 14px; background: var(--accent-color); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;}
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #999; }
        #trip-container { display: none; padding-bottom: 90px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .header-info p { margin: 4px 0 0 0; font-size: 0.8rem; color: #888; font-weight: bold; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.7rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { font-size: 1.2rem; margin: 10px 0 15px 0; color: var(--accent-color); font-weight: bold; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input, .input-group select { flex: 1; padding: 12px; border: 1px solid var(--light-gray); border-radius: 8px; font-size: 1rem; }
        button.add-btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button.add-btn-secondary { background-color: var(--tab-bg); color: var(--accent-color); border: 1px dashed var(--accent-color); padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .list-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .list-item input[type="checkbox"] { margin-right: 12px; transform: scale(1.3); accent-color: var(--accent-color); }
        .item-text-container { flex-grow: 1; display: flex; align-items: center; }
        .item-name { font-weight: bold; font-size: 0.95rem; transition: color 0.2s; }
        .checked-text { text-decoration: line-through; color: #bbb; }
        .expense-total { text-align: center; font-size: 2rem; font-weight: bold; color: var(--accent-color); margin: 10px 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #eee; }
        .exp-cat { font-size: 0.75rem; background: var(--tab-bg); padding: 2px 6px; border-radius: 4px; margin-right: 8px; color: var(--accent-color); }
        .exp-details { flex-grow: 1; }
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tabs::-webkit-scrollbar { display: none; }
        .date-tab { min-width: 60px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; display: flex; flex-direction: column; gap: 4px;}
        .date-tab .date { font-size: 0.8rem; }
        .date-tab .day { font-size: 1.1rem; font-weight: bold; }
        .date-tab .weekday { font-size: 0.7rem; font-weight: normal; margin-top: -2px;} 
        .date-tab.active { background: var(--accent-color); color: #fff; box-shadow: 0 4px 10px rgba(140, 123, 108, 0.3); border-color: var(--accent-color); }
        .daily-board { padding: 20px; background: var(--card-bg); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .board-left h2 { margin: 0 0 8px 0; font-size: 1.4rem; }
        .board-left p { margin: 0; font-size: 0.85rem; color: #666; background: var(--tab-bg); padding: 4px 10px; border-radius: 12px; display: inline-block; }
        .weather-icon { font-size: 1.8rem; line-height: 1; }
        .weather-temp { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); margin-top: 4px; }
        .weather-loc { font-size: 0.65rem; color: #aaa; }
        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; display: flex; gap: 15px; position: relative; }
        .sortable-ghost { opacity: 0.4; border: 2px dashed var(--accent-color); }
        .drag-handle { color: #ccc; display: flex; align-items: center; justify-content: center; padding-right: 5px; font-size: 1.5rem; cursor: grab; touch-action: none; }
        .time-col { min-width: 50px; text-align: right; }
        .time-col .time { font-size: 0.9rem; font-weight: bold; cursor: text; }
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 15px; position: relative; flex-grow: 1; }
        .event-col::before { content: ''; width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; position: absolute; left: -5px; top: 5px; }
        .event-title { font-size: 1rem; font-weight: bold; margin: 0 0 5px 0; cursor: text;}
        .loc-text { font-size: 0.8rem; color: #888; margin-bottom: 5px; cursor: text;}
        .map-link-btn { display: inline-block; font-size: 0.8rem; color: #1a73e8; text-decoration: none; background: #f1f3f4; padding: 4px 8px; border-radius: 8px; margin-top: 5px; font-weight: bold; cursor: pointer; border: none; }
        .delete-event-btn { position: absolute; right: 10px; top: 15px; padding: 5px; }
        .category-header { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); margin: 15px 0 5px 0; border-bottom: 1px solid var(--light-gray); padding-bottom: 5px; }
        .hotel-map-btn { display: flex; justify-content: center; align-items: center; background: #e8f0fe; color: #1a73e8; padding: 12px; border-radius: 10px; text-decoration: none; font-size: 0.95rem; font-weight: bold; margin-top: 15px; transition: background 0.2s; cursor: pointer; border: none; width: 100%; }
        [contenteditable="true"] { border-bottom: 1px dashed transparent; min-height: 20px; display: inline-block; width: 100%; transition: border 0.2s; }
        [contenteditable="true"]:focus { background-color: #f0eadd; outline: none; border-bottom: 1px dashed var(--accent-color); cursor: text; }
    </style>
</head>
<body>
<div id="index-page">
    <h1 class="page-title">✈️ My Journeys</h1>
    <div id="trip-list"></div>
    <div class="fab" onclick="document.getElementById('add-modal').style.display='flex'">+</div>
</div>
<div id="add-modal">
    <div class="modal-content">
        <button class="close-modal" onclick="document.getElementById('add-modal').style.display='none'">×</button>
        <h2 style="margin-top:0; margin-bottom: 20px;">建立新旅程</h2>
        <div class="input-group-modal"><label>目的地</label><input type="text" id="new-dest" placeholder="輸入目的地..."></div>
        <div class="input-group-modal"><label>出發日期</label><input type="date" id="new-start-date"></div>
        <button class="btn-manual" onclick="createNewTrip()">建立行程</button>
    </div>
</div>
<div id="trip-container">
    <header class="trip-header">
        <div class="header-info"><h1 id="top-title">載入中...</h1><p id="top-date">...</p></div>
        <button class="back-btn" onclick="goHome()">❮ 列表</button>
    </header>
    <div id="tab-itinerary" class="main-tab-content active" style="padding-top:0;">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div class="daily-board">
            <div class="board-left"><h2 id="board-date">Day 1</h2><p id="board-summary">準備出發</p></div>
            <div class="board-right" id="weather-box"><div class="weather-icon" id="board-icon">⏳</div><div class="weather-temp" id="board-temp">抓取中</div><div class="weather-loc">當地天氣</div></div>
        </div>
        <div id="itinerary-list"></div>
        <button class="add-btn-secondary" onclick="addItineraryEvent()">+ 新增時段</button>
    </div>
    <div id="tab-expenses" class="main-tab-content">
        <h3 class="section-title">💰 旅途記帳本</h3>
        <div class="card" style="text-align: center; padding: 25px 15px;">
            <div style="font-size: 0.85rem; color: #888;">目前總花費 (預估台幣)</div>
            <div class="expense-total">NT$ <span id="total-twd">0</span></div>
        </div>
        <div class="input-group"><select id="exp-cat"><option value="🍽️ 餐飲">餐飲</option><option value="🛍️ 購物">購物</option><option value="🚕 交通">交通</option><option value="🎫 票券">票券</option></select><input type="text" id="exp-name" placeholder="項目名稱..."></div>
        <div class="input-group"><input type="number" id="exp-amount" placeholder="金額..."><button class="add-btn" onclick="addExpense()">新增</button></div>
        <div class="card" id="expense-list-container"></div>
    </div>
    <div id="tab-shopping" class="main-tab-content">
        <h3 class="section-title">🛒 採買清單</h3>
        <div class="input-group"><input type="text" id="shop-input" placeholder="想買什麼？"><button class="add-btn" onclick="addListObj('shopping', 'shop-input', '')">新增</button></div>
        <div class="card" style="padding: 5px 15px;" id="shopping-list-container"></div>
    </div>
    <div id="tab-tools" class="main-tab-content">
        <h3 class="section-title">🧰 旅行助手</h3>
        <div class="card">
            <strong style="color: var(--accent-color); font-size: 1.1rem;">🏨 住宿資訊</strong>
            <div style="margin-top: 15px;"><div style="font-size: 0.85rem; color: #888;">飯店地址 / 名稱</div><div contenteditable="true" style="font-weight: bold; margin-top: 5px; line-height: 1.4;" id="hotel-address" onblur="saveHotelAddress()">127 E 30th St, New York, NY 10016</div></div>
            <button onclick="openHotelMap()" class="hotel-map-btn"><span>🗺️ 在 Google Maps 上開啟</span></button>
        </div>
        <div class="card">
            <strong style="color: var(--accent-color); font-size: 1.1rem;">💰 匯率計算機</strong>
            <div style="display: flex; align-items: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; margin: 15px 0;"><span style="font-size: 1.2rem; margin-right: 10px;">$</span><input type="number" id="usd-input" placeholder="輸入金額..." oninput="calcExchange()" style="border:none; outline:none; font-size:1.2rem; width:100%;"></div>
            <div style="text-align: right; color: #666;">約合 <span id="twd-result" style="color: var(--accent-color); font-size: 1.6rem; font-weight: bold;">0</span> 台幣 (預設 x32.2)</div>
        </div>
    </div>
    <div id="tab-packing" class="main-tab-content">
        <h3 class="section-title">🧳 行李清單</h3>
        <div class="input-group"><select id="pack-cat"><option value="必備文件">必備文件</option><option value="電子產品">電子產品</option><option value="衣物配件">衣物配件</option><option value="盥洗用品">盥洗用品</option><option value="其他">其他</option></select><input type="text" id="pack-input" placeholder="要帶什麼？"></div>
        <button class="add-btn" style="width: 100%; margin-bottom: 20px;" onclick="addListObj('packing', 'pack-input', 'pack-cat')">新增至分類</button>
        <div class="card" style="padding: 5px 15px;" id="packing-list-container"></div>
    </div>
    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>行程</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>記帳</div>
        <div class="nav-item" onclick="switchMainTab('tab-shopping', this)"><span class="nav-icon">🛒</span>購物</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>工具</div>
        <div class="nav-item" onclick="switchMainTab('tab-packing', this)"><span class="nav-icon">🧳</span>行李</div>
    </nav>
</div>
<script>
    const trashIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
    let weatherForecast = [], currentDates = [], activeTripTitle = '', sortableInstance = null;
    let appData = {
        hotelAddress: "127 E 30th St, New York, NY 10016",
        trips: [ { id: 1, title: '🇺🇸 紐約 (New York)', startDate: '2026-04-20' } ],
        shopping: [ { id: 1, text: '紐約任天堂皮卡丘限定玩偶', checked: false } ],
        packing: [ { id: 1, text: '護照與個人證件', cat: '必備文件', checked: false }, { id: 2, text: 'I-20', cat: '必備文件', checked: false }, { id: 3, text: 'Ricoh GR III 與備用電池', cat: '電子產品', checked: false } ],
        expenses: [],
        itineraries: {}
    };
    function saveData() { localStorage.setItem('myTravelApp_V11', JSON.stringify(appData)); }
    function loadData() {
        const saved = localStorage.getItem('myTravelApp_V11');
        if (saved) { appData = JSON.parse(saved); } 
        else {
            appData.itineraries['🇺🇸 紐約 (New York)'] = {
                1: [ { time: '21:53', title: '✈️ 航班起飛 (HA 6651)', loc: 'San Francisco (SFO)' } ],
                2: [
                    { time: '06:30', title: '🛬 抵達紐華克機場', loc: 'Newark (EWR)' },
                    { time: '08:30', title: '🏨 抵達飯店寄放行李', loc: '127 E 30th St' },
                    { time: '09:30', title: '☕ 早晨咖啡：Stumptown Coffee', loc: 'Stumptown Coffee Roasters' },
                    { time: '11:00', title: '🌳 麥迪遜廣場公園散步', loc: 'Madison Square Park' },
                    { time: '13:00', title: '🏛️ 911 紀念博物館', loc: '180 Greenwich St' }
                ],
                3: [
                    { time: '09:30', title: '☕ 絕美復古咖啡廳：Ralph\'s Coffee', loc: '888 Madison Ave' },
                    { time: '10:30', title: '🎨 大都會美術館 (The MET)', loc: '1000 5th Ave' },
                    { time: '14:00', title: '🌳 中央公園悠閒漫步', loc: 'Central Park' },
                    { time: '16:00', title: '🛍️ 第五大道逛街', loc: '5th Ave' },
                    { time: '19:00', title: '🎭 音樂劇：The Great Gatsby', loc: 'Broadway Theatre' }
                ],
                4: [
                    { time: '10:00', title: '☕ 溫室綠意咖啡：Devocion', loc: 'Devocion Flatiron' },
                    { time: '11:30', title: '🚶 高線公園 (High Line)', loc: 'The High Line' },
                    { time: '13:00', title: '🦞 雀兒喜市場 (Chelsea Market)', loc: 'Chelsea Market' },
                    { time: '16:00', title: '🌇 探索西村 (West Village)', loc: 'West Village' },
                    { time: '18:00', title: '🍝 晚餐：Tony\'s Di Napoli (已訂位)', loc: '147 W 43rd St' }
                ],
                5: [
                    { time: '10:00', title: '🥯 經典紐約貝果早餐', loc: 'Ess-a-Bagel' },
                    { time: '11:30', title: '🌉 布魯克林大橋打卡', loc: 'Brooklyn Bridge' },
                    { time: '14:30', title: '🧳 返回飯店拿行李出發', loc: '127 E 30th St' },
                    { time: '18:23', title: '✈️ 班機回程 (AS 293)', loc: 'Newark (EWR)' }
                ]
            };
            saveData();
        }
    }
    function renderTrips() {
        const list = document.getElementById('trip-list'); list.innerHTML = '';
        appData.trips.forEach((trip, index) => {
            list.innerHTML += `<div class="trip-card" onclick="openTrip('${trip.title}', '${trip.startDate}')"><div class="trip-info"><h2>${trip.title}</h2><p>出發日：${trip.startDate}</p></div><button class="delete-btn" onclick="deleteTrip(${index}, event)">${trashIcon}</button></div>`;
        });
    }
    function createNewTrip() {
        const dest = document.getElementById('new-dest').value || '未命名', dateStr = document.getElementById('new-start-date').value || new Date().toISOString().split('T')[0], newTitle = `📍 ${dest}`;
        appData.trips.push({ title: newTitle, startDate: dateStr }); appData.itineraries[newTitle] = { 1: [], 2: [], 3: [], 4: [], 5: [] };
        saveData(); renderTrips(); document.getElementById('add-modal').style.display = 'none';
    }
    function deleteTrip(index, event) {
        event.stopPropagation(); if(confirm("確定刪除旅程？")) { delete appData.itineraries[appData.trips[index].title]; appData.trips.splice(index, 1); saveData(); renderTrips(); }
    }
    function goHome() { document.getElementById('trip-container').style.display = 'none'; document.getElementById('index-page').style.display = 'block'; }
    function openTrip(title, startDate) {
        activeTripTitle = title; document.getElementById('index-page').style.display = 'none'; document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = title; document.getElementById('top-date').innerText = `出發日：${startDate}`;
        generateDateTabs(startDate); fetchWeather(title); renderLists(); renderExpenses(); window.scrollTo(0, 0);
    }
    function generateDateTabs(startDateStr) {
        const tabsContainer = document.getElementById('dynamic-date-tabs'); tabsContainer.innerHTML = ''; currentDates = [];
        const parts = startDateStr.split('-'), start = new Date(parts[0], parts[1] - 1, parts[2]), weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        for(let i=0; i<5; i++) {
            let current = new Date(start); current.setDate(start.getDate() + i);
            let mm = String(current.getMonth() + 1).padStart(2, '0'), dd = String(current.getDate()).padStart(2, '0'), displayDate = `${mm}/${dd}`, wd = weekdays[current.getDay()];
            currentDates.push(displayDate);
            tabsContainer.innerHTML += `<div class="date-tab ${i === 0 ? 'active' : ''}" onclick="switchDate(${i+1}, this)"><div class="day">D${i+1}</div><div class="date">${displayDate}</div><div class="weekday">(${wd})</div></div>`;
        }
        switchDate(1, tabsContainer.children[0]);
    }
    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active')); if(element) element.classList.add('active');
        document.getElementById('board-date').innerText = `Day ${dayNum} (${currentDates[dayNum-1]})`;
        if(weatherForecast.length >= dayNum) { const w = weatherForecast[dayNum-1]; document.getElementById('board-temp').innerText = `${w.min}°~${w.max}°`; document.getElementById('board-icon').innerText = w.icon; }
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        let dayEvents = appData.itineraries[activeTripTitle] && appData.itineraries[activeTripTitle][dayNum] ? appData.itineraries[activeTripTitle][dayNum] : [];
        dayEvents.forEach((ev, idx) => {
            const evId = `event-${dayNum}-${idx}`;
            container.innerHTML += `<div class="timeline-card" data-index="${idx}"><div class="drag-handle">⋮⋮</div><div class="time-col"><div class="time" contenteditable="true" onblur="saveCurrentItinerary()">${ev.time}</div></div><div class="event-col"><div class="event-title" id="${evId}" contenteditable="true" onblur="saveCurrentItinerary()">${ev.title}</div><div class="loc-text" contenteditable="true" onblur="saveCurrentItinerary()">${ev.loc || ''}</div><button class="map-link-btn" onclick="searchMap('${evId}')">🗺️ Maps</button></div><button class="delete-btn delete-event-btn" onclick="deleteItineraryEvent(${dayNum}, ${idx})">${trashIcon}</button></div>`;
        });
        initSortable(dayNum);
    }
    function initSortable(dayNum) {
        const el = document.getElementById('itinerary-list'); if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(el, { handle: '.drag-handle', animation: 150, ghostClass: 'sortable-ghost', onEnd: function (evt) {
            let events = appData.itineraries[activeTripTitle][dayNum]; const [moved] = events.splice(evt.oldIndex, 1); events.splice(evt.newIndex, 0, moved);
            recalculateTimes(dayNum); saveData(); switchDate(dayNum, document.querySelector('.date-tab.active'));
        }});
    }
    function recalculateTimes(dayNum) {
        let events = appData.itineraries[activeTripTitle][dayNum]; if(events.length <= 1) return;
        let [hrs, mins] = events[0].time.split(':').map(Number); if(isNaN(hrs)) return;
        let totalMins = hrs * 60 + mins;
        for(let i = 1; i < events.length; i++) { totalMins += 120; let newH = Math.floor(totalMins / 60) % 24, newM = totalMins % 60; events[i].time = `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`; }
    }
    function saveCurrentItinerary() {
        const activeDay = document.querySelector('.date-tab.active .day').innerText.replace('D', '');
        const cards = document.querySelectorAll('.timeline-card');
        let newDayData = []; cards.forEach(card => { newDayData.push({ time: card.querySelector('.time').innerText, title: card.querySelector('.event-title').innerText, loc: card.querySelector('.loc-text').innerText }); });
        appData.itineraries[activeTripTitle][activeDay] = newDayData; saveData();
    }
    function addItineraryEvent() {
        const activeDay = document.querySelector('.date-tab.active .day').innerText.replace('D', '');
        if(!appData.itineraries[activeTripTitle][activeDay]) appData.itineraries[activeTripTitle][activeDay] = [];
        appData.itineraries[activeTripTitle][activeDay].push({ time: '12:00', title: '新行程', loc: '地點' }); saveData(); switchDate(activeDay, document.querySelector('.date-tab.active'));
    }
    function deleteItineraryEvent(dayNum, idx) { if(confirm("刪除？")) { appData.itineraries[activeTripTitle][dayNum].splice(idx, 1); saveData(); switchDate(dayNum, document.querySelector('.date-tab.active')); } }
    function searchMap(elementId) {
        const loc = document.getElementById(elementId).nextElementSibling.innerText.trim() || document.getElementById(elementId).innerText;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, ''))}`, '_blank');
    }
    function saveHotelAddress() { appData.hotelAddress = document.getElementById('hotel-address').innerText; saveData(); }
    function openHotelMap() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(document.getElementById('hotel-address').innerText)}`, '_blank'); }
    async function fetchWeather(cityStr) {
        try {
            let searchCity = cityStr.includes('紐約') ? 'New York' : cityStr.replace('📍 ', '');
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${searchCity}&count=1`), geoData = await geoRes.json();
            const {latitude, longitude} = geoData.results[0];
            const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`), wxData = await wxRes.json();
            weatherForecast = []; for(let i=0; i<5; i++) {
                let code = wxData.daily.weathercode[i], icon = (code <= 3) ? '☀️' : (code <= 69) ? '🌧️' : '🌤️';
                weatherForecast.push({ max: Math.round(wxData.daily.temperature_2m_max[i]), min: Math.round(wxData.daily.temperature_2m_min[i]), icon });
            }
            switchDate(parseInt(document.querySelector('.date-tab.active .day').innerText.replace('D','')), document.querySelector('.date-tab.active'));
        } catch (e) {}
    }
    function addExpense() {
        const cat = document.getElementById('exp-cat').value, name = document.getElementById('exp-name').value, amount = parseFloat(document.getElementById('exp-amount').value);
        if(!name || isNaN(amount)) return; appData.expenses.push({ cat, name, amount }); saveData(); renderExpenses();
    }
    function renderExpenses() {
        const container = document.getElementById('expense-list-container'); container.innerHTML = ''; let totalLocal = 0;
        appData.expenses.forEach((exp, i) => { totalLocal += exp.amount; container.innerHTML += `<div class="expense-item"><div class="exp-details"><span class="exp-cat">${exp.cat}</span> ${exp.name}</div><div style="font-weight:bold;">$${exp.amount}</div><button class="delete-btn" onclick="deleteExpense(${i})">${trashIcon}</button></div>`; });
        document.getElementById('total-twd').innerText = Math.round(totalLocal * 32.2).toLocaleString();
    }
    function deleteExpense(i) { appData.expenses.splice(i, 1); saveData(); renderExpenses(); }
    function addListObj(type, inId, catId) {
        const val = document.getElementById(inId).value; if(!val) return;
        appData[type].push({ id: Date.now(), text: val, cat: catId ? document.getElementById(catId).value : '', checked: false });
        saveData(); document.getElementById(inId).value = ''; renderLists();
    }
    function renderLists() {
        const shopCont = document.getElementById('shopping-list-container');
        shopCont.innerHTML = appData.shopping.map((item, i) => `<div class="list-item"><div class="item-text-container"><input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck('shopping', ${i})"><span class="item-name ${item.checked ? 'checked-text' : ''}">${item.text}</span></div><button class="delete-btn" onclick="deleteListObj('shopping', ${i})">${trashIcon}</button></div>`).join('');
        const packCont = document.getElementById('packing-list-container'); packCont.innerHTML = ''; const groups = {};
        appData.packing.forEach((item, i) => { if(!groups[item.cat]) groups[item.cat] = []; item.idx = i; groups[item.cat].push(item); });
        for (const [cat, items] of Object.entries(groups)) {
            let html = `<div class="category-header">${cat}</div>`;
            items.forEach(item => { html += `<div class="list-item"><div class="item-text-container"><input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck('packing', ${item.idx})"><span class="item-name ${item.checked ? 'checked-text' : ''}">${item.text}</span></div><button class="delete-btn" onclick="deleteListObj('packing', ${item.idx})">${trashIcon}</button></div>`; });
            packCont.innerHTML += html;
        }
    }
    function deleteListObj(type, i) { appData[type].splice(i, 1); saveData(); renderLists(); }
    function toggleCheck(type, i) { appData[type][i].checked = !appData[type][i].checked; saveData(); renderLists(); }
    function switchMainTab(id, el) { document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function calcExchange() { const val = document.getElementById('usd-input').value, res = document.getElementById('twd-result'); res.innerText = val ? Math.round(val * 32.2).toLocaleString() : '0'; }
    loadData(); renderTrips();
</script>
</body>
</html>
