<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bon Voyage</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bon Voyage">
    <link rel="apple-touch-icon" href="https://i.imgur.com/rRmXupF.jpeg">
    <link rel="icon" href="https://i.imgur.com/rRmXupF.jpeg">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* 🔥 UI 調整 2：換回溫暖直覺的淡鵝黃色 🔥 */
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --memo-bg: #fff8d6; --danger-color: #ff4d4f; }
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Noto Sans TC", -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overscroll-behavior-y: none; }
        
        #index-page { padding: 20px; display: block; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; text-align: center;}
        
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: transform 0.1s;}
        .trip-card:active { transform: scale(0.98); }
        .trip-info { flex: 1; cursor: pointer; }
        
        #trip-container { display: none; padding-bottom: 110px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        
        /* 🔥 UI 調整 3：增加導航列的 padding-bottom，讓它遠離 iPhone 的底部黑條 🔥 */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(25px + env(safe-area-inset-bottom, 15px)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.75rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tab { min-width: 65px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; display: flex; flex-direction: column; gap: 4px;}
        .date-tab.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        .daily-board { padding: 20px; background: var(--card-bg); border-radius: 16px; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .board-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .summary-box { background: var(--tab-bg); padding: 10px 15px; border-radius: 12px; border-left: 4px solid var(--accent-color); }
        .summary-label { font-size: 0.65rem; color: var(--accent-color); font-weight: bold; margin-bottom: 4px; }
        .summary-text { font-size: 0.95rem; font-weight: bold; color: var(--text-color); line-height: 1.4; }
        .weather-temp { font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px 12px 15px 10px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; gap: 10px; position: relative; }
        .drag-handle { color: #ccc; cursor: grab; display: flex; align-items: center; font-size: 1.2rem; }
        
        .time-col { min-width: 75px; margin-right: 12px; }
        .time-input { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); border: 1px solid var(--light-gray); background: var(--tab-bg); border-radius: 6px; padding: 6px 4px; width: 100%; text-align: center; box-sizing: border-box; }
        
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 15px; flex-grow: 1; padding-right: 15px; }
        .event-title { font-size: 1rem; font-weight: bold; margin-bottom: 4px; }
        .loc-text { font-size: 0.8rem; color: #888; }
        
        .action-row { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; }
        
        .memo-btn { background: var(--memo-bg); color: var(--accent-color); }
        .map-btn { background: #e8f0fe; color: #1a73e8; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        
        input[type="text"], input[type="number"], input[type="date"], select { flex: 1; width: 100%; padding: 12px; border: 1px solid var(--light-gray); border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: #fff; }
        input[type="checkbox"] { width: 22px; height: 22px; margin: 0 12px 0 0; flex: none; cursor: pointer; accent-color: var(--accent-color); }
        
        .add-btn { background: var(--accent-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; white-space: nowrap; }
        
        .del-item-btn { border: none; background: none; color: #ddd; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .list-row span { display: flex; align-items: center; flex: 1; font-size: 16px; }

        [contenteditable="true"]:focus, textarea:focus { outline: none; background: #fffcf5; border-color: var(--accent-color); }
        .sync-indicator { font-size: 11px; color: #999; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="index-page">
    <h1 class="page-title">Bon Voyage</h1>
    <div class="sync-indicator" id="sync-status">連線中...</div>
    
    <div id="trip-list"></div>

    <div class="card" style="margin-top: 30px; border: 1px dashed var(--accent-color);">
        <div style="font-weight: bold; color: var(--accent-color); margin-bottom: 10px;">＋ 規劃新旅程</div>
        <input type="text" id="new-trip-title" placeholder="旅程名稱 (如: 🇯🇵 東京之旅)">
        <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
            <input type="date" id="new-trip-start" style="padding:12px; border:1px solid var(--light-gray); border-radius:8px; font-size:15px; flex:1; box-sizing:border-box;">
            <span style="color:#888; font-weight:bold;">~</span>
            <input type="date" id="new-trip-end" style="padding:12px; border:1px solid var(--light-gray); border-radius:8px; font-size:15px; flex:1; box-sizing:border-box;">
        </div>
        <button class="add-btn" onclick="addNewTrip()" style="width: 100%; margin-top: 15px;">建立旅程</button>
    </div>
</div>

<div id="trip-container">
    <header class="trip-header">
        <div class="header-info"><h1 id="top-title">...</h1><p id="top-date">...</p></div>
        <button class="back-btn" onclick="goHome()">❮ 返回列表</button>
    </header>

    <div id="tab-itinerary" class="main-tab-content active">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div class="daily-board">
            <div class="board-top">
                <div class="board-left"><h2 id="board-date" style="margin:0;">Day 1</h2></div>
                <div class="board-right" style="text-align: right;">
                    <div id="board-icon" style="font-size: 1.2rem;">☀️</div>
                    <div class="weather-temp" id="board-temp">--°C</div>
                </div>
            </div>
            <div class="summary-box">
                <div class="summary-label">TODAY'S HIGHLIGHT 今日重點</div>
                <div class="summary-text" id="board-summary" contenteditable="true" onblur="saveSummary()">點擊輸入今日行程摘要...</div>
            </div>
        </div>
        <div id="itinerary-list"></div>
        <button onclick="addItineraryEvent()" style="width:100%; padding:15px; border:1px dashed var(--accent-color); background:none; color:var(--accent-color); border-radius:12px; font-weight:bold; margin-top:10px;">+ 新增行程時段</button>
    </div>

    <div id="tab-expenses" class="main-tab-content">
        <h3 style="color: var(--accent-color);">💰 旅途記帳本</h3>
        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; color: #888;">目前總花費 (約合台幣)</div>
            <div style="font-size: 2.2rem; font-weight: bold; color: var(--accent-color);">NT$ <span id="total-twd">0</span></div>
        </div>
        <div class="input-group" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <select id="exp-cat"><option value="🍽️ 餐飲">餐飲</option><option value="🛍️ 購物">購物</option><option value="🚕 交通">交通</option><option value="🎫 票券">票券</option></select>
                <input type="text" id="exp-name" placeholder="項目名稱...">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="exp-amount" placeholder="金額 (USD)...">
                <button class="add-btn" onclick="addExpense()" style="flex: 0.5;">新增</button>
            </div>
        </div>
        <div class="card" id="expense-list-container"></div>
    </div>

    <div id="tab-lists" class="main-tab-content">
        <h3 style="color: var(--accent-color);">🛒 採買清單</h3>
        <div style="display:flex; gap:10px; margin-bottom: 20px;"><input type="text" id="shop-input" placeholder="想買什麼？"><button class="add-btn" onclick="addListObj('shopping', 'shop-input', '')">新增</button></div>
        <div class="card" id="shopping-list-container"></div>

        <h3 style="color: var(--accent-color); margin-top: 30px;">🍔 必吃美食</h3>
        <div style="display:flex; flex-direction:column; gap:10px; margin-bottom: 20px;">
            <select id="food-cat">
                <option value="☕ 咖啡">☕ 咖啡</option>
                <option value="🍽️ 正餐">🍽️ 正餐</option>
                <option value="🍰 點心">🍰 點心</option>
                <option value="🍺 酒吧">🍺 酒吧</option>
            </select>
            <div style="display:flex; gap:10px;"><input type="text" id="food-input" placeholder="想吃哪家店？"><button class="add-btn" onclick="addListObj('food', 'food-input', 'food-cat')">新增</button></div>
        </div>
        <div class="card" id="food-list-container"></div>
    </div>

    <div id="tab-tools" class="main-tab-content">
        <h3 style="color: var(--accent-color);">🧰 旅行助手</h3>
        <div class="card">
            <strong>🏨 飯店地址</strong>
            <div contenteditable="true" id="hotel-address" style="margin: 15px 0; font-weight: bold;" onblur="saveHotelAddress()">載入中...</div>
            <button onclick="openHotelMap()" style="width:100%; padding:12px; border:none; border-radius:10px; background:#e8f0fe; color:#1a73e8; font-weight:bold;">📍 在 Google Maps 開啟</button>
        </div>

        <div class="card">
            <strong id="exchange-rate-label">💰 匯率換算</strong>
            <div style="display: flex; align-items: center; border-bottom: 2px solid var(--accent-color); padding: 10px 0;">
                <span class="currency-symbol" style="font-size: 1.5rem; margin-right: 10px;">$</span>
                <input type="number" id="usd-input" placeholder="當地金額" oninput="calcExchange()" style="border:none; outline:none; font-size:1.5rem; width:100%; background:none;">
            </div>
            <div style="text-align: right; margin-top:15px; color: #666;">≈ <span id="twd-result" style="color: var(--accent-color); font-size: 1.8rem; font-weight: bold;">0</span> 台幣</div>
        </div>

        <h3 style="color: var(--accent-color); margin-top: 30px;">🧳 行李檢查</h3>
        <div style="display:flex; flex-direction:column; gap:10px; margin-bottom: 20px;">
            <select id="pack-cat">
                <option value="必備文件">必備文件</option>
                <option value="電子產品">電子產品</option>
                <option value="衣物配件">衣物配件</option>
                <option value="其他">其他</option>
            </select>
            <div style="display:flex; gap:10px;"><input type="text" id="pack-input" placeholder="要帶什麼？"><button class="add-btn" onclick="addListObj('packing', 'pack-input', 'pack-cat')">新增</button></div>
        </div>
        <div class="card" id="packing-list-container"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>行程</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>記帳</div>
        <div class="nav-item" onclick="switchMainTab('tab-lists', this)"><span class="nav-icon">🛒</span>清單</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>工具</div>
    </nav>
</div>

<script>
    let activeTripTitle = '';
    let weatherForecast = [];
    let currentDates = [];
    let sortableInstance = null;
    let manuallyOpenedMemos = new Set();
    
    let currentCurrency = { code: 'USD', rate: 32.2, symbol: '$' };
    
    function detectCurrency(title) {
        if (/🇯🇵|日本|東京|大阪|京都/.test(title)) return { code: 'JPY', rate: 0.21, symbol: '¥' };
        if (/🇰🇷|韓國|首爾/.test(title)) return { code: 'KRW', rate: 0.024, symbol: '₩' };
        if (/🇪🇺|歐洲|法國|德國|義大利/.test(title)) return { code: 'EUR', rate: 34.5, symbol: '€' };
        if (/🇬🇧|英國|倫敦/.test(title)) return { code: 'GBP', rate: 40.5, symbol: '£' };
        if (/🇹🇼|台灣|台北/.test(title)) return { code: 'TWD', rate: 1, symbol: 'NT$' };
        return { code: 'USD', rate: 32.2, symbol: '$' }; 
    }

    let appData = {
        lastOpenTrip: null, hotelAddress: "載入中...", trips: [], summaries: {}, 
        shopping: [], food: [], packing: [], expenses: [], itineraries: {}
    };

    async function saveData() {
        const st = document.getElementById('sync-status');
        if(st) st.innerText = "同步中...";
        try {
            await fetch('/api/db', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(appData) });
            if(st) st.innerText = "雲端已同步 ✓";
        } catch (e) { if(st) st.innerText = "連線失敗 (離線模式)"; }
    }

    async function loadData() {
        const st = document.getElementById('sync-status');
        if(st) st.innerText = "載入中...";
        try {
            const res = await fetch('/api/db');
            if (res.ok) {
                const cloudData = await res.json();
                if (cloudData && cloudData.trips) {
                    cloudData.food = cloudData.food || [];
                    cloudData.trips.forEach(t => {
                        if(!t.endDate) {
                            const [y, m, d] = t.startDate.split('-');
                            let dateObj = new Date(y, m - 1, d);
                            dateObj.setDate(dateObj.getDate() + 4);
                            const ny = dateObj.getFullYear(), nm = String(dateObj.getMonth() + 1).padStart(2, '0'), nd = String(dateObj.getDate()).padStart(2, '0');
                            t.endDate = `${ny}-${nm}-${nd}`;
                        }
                    });
                    appData = cloudData;
                    if(st) st.innerText = "雲端已同步 ✓";
                }
            }
        } catch (e) { console.error("Load failed", e); }
        
        renderTrips();
        if (appData.hotelAddress && document.getElementById('hotel-address')) document.getElementById('hotel-address').innerText = appData.hotelAddress;
        if(appData.lastOpenTrip) {
            const t = appData.trips.find(x => x.title === appData.lastOpenTrip);
            if(t) openTrip(t.title);
        }
    }

    function renderTrips() {
        const list = document.getElementById('trip-list'); list.innerHTML = '';
        appData.trips.forEach((trip, idx) => {
            list.innerHTML += `
                <div class="trip-card">
                    <div class="trip-info" onclick="openTrip('${trip.title}')">
                        <h2 style="margin:0;">${trip.title}</h2>
                        <p style="margin:5px 0 0 0; font-size:0.8rem; color:#888;">${trip.startDate} ~ ${trip.endDate}</p>
                    </div>
                    <button onclick="deleteTrip(event, ${idx})" style="border:none; background:none; color:#ccc; font-size:1.6rem; padding:0 10px; cursor:pointer;">×</button>
                </div>`;
        });
    }

    async function deleteTrip(event, idx) {
        event.stopPropagation();
        if(confirm(`確定要刪除「${appData.trips[idx].title}」嗎？`)) {
            const title = appData.trips[idx].title;
            appData.trips.splice(idx, 1);
            delete appData.itineraries[title];
            delete appData.summaries[title];
            await saveData(); renderTrips();
        }
    }

    async function addNewTrip() {
        const title = document.getElementById('new-trip-title').value;
        const start = document.getElementById('new-trip-start').value;
        const end = document.getElementById('new-trip-end').value;
        
        if(!title || !start || !end) return alert("請輸入完整旅程名稱與日期區間");
        if(new Date(end) < new Date(start)) return alert("結束日期不能早於開始日期喔！");

        appData.trips.push({ title, startDate: start, endDate: end });
        appData.itineraries[title] = {}; appData.summaries[title] = {};
        await saveData(); renderTrips();
        
        document.getElementById('new-trip-title').value = '';
        document.getElementById('new-trip-start').value = '';
        document.getElementById('new-trip-end').value = '';
    }

    function openTrip(title) {
        const trip = appData.trips.find(t => t.title === title);
        if(!trip) return;
        activeTripTitle = title; appData.lastOpenTrip = title; saveData();
        
        currentCurrency = detectCurrency(title);
        document.getElementById('exp-amount').placeholder = `金額 (${currentCurrency.code})...`;
        document.getElementById('usd-input').placeholder = `當地幣別 ${currentCurrency.code}`;
        document.getElementById('exchange-rate-label').innerText = `💰 匯率換算 (1 : ${currentCurrency.rate})`;
        document.querySelector('.currency-symbol').innerText = currentCurrency.symbol;

        document.getElementById('index-page').style.display = 'none';
        document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = title;
        document.getElementById('top-date').innerText = `${trip.startDate} ~ ${trip.endDate}`;
        
        generateDateTabs(trip.startDate, trip.endDate); 
        fetchWeather(title); renderLists(); renderExpenses();
    }

    function goHome() { appData.lastOpenTrip = null; saveData(); document.getElementById('trip-container').style.display = 'none'; document.getElementById('index-page').style.display = 'block'; }

    function generateDateTabs(startStr, endStr) {
        const container = document.getElementById('dynamic-date-tabs'); container.innerHTML = ''; currentDates = [];
        const [sy, sm, sd] = startStr.split('-'); const [ey, em, ed] = endStr.split('-');
        const start = new Date(sy, sm - 1, sd); const end = new Date(ey, em - 1, ed);
        const diffDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
        
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        for(let i=0; i<diffDays; i++) {
            let current = new Date(sy, sm - 1, sd); current.setDate(current.getDate() + i);
            let displayDate = `${String(current.getMonth() + 1).padStart(2, '0')}/${String(current.getDate()).padStart(2, '0')}`;
            currentDates.push(displayDate);
            container.innerHTML += `<div class="date-tab" onclick="switchDate(${i+1}, this)"><div style="font-size:0.8rem; font-weight:bold;">Day ${i+1}</div><div>${displayDate}</div><div style="font-size:0.6rem;">(${weekdays[current.getDay()]})</div></div>`;
        }
        if(container.children.length > 0) switchDate(1, container.children[0]);
    }

    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active')); if(element) element.classList.add('active');
        document.getElementById('board-date').innerText = `Day ${dayNum} (${currentDates[dayNum-1]})`;
        document.getElementById('board-summary').innerText = (appData.summaries[activeTripTitle] && appData.summaries[activeTripTitle][dayNum]) || "點擊輸入今日重點...";
        renderItinerary(dayNum);
        
        if(weatherForecast[dayNum-1]) {
            document.getElementById('board-temp').innerText = `${weatherForecast[dayNum-1].min}°~${weatherForecast[dayNum-1].max}°`;
            document.getElementById('board-icon').innerText = weatherForecast[dayNum-1].icon;
        } else {
            document.getElementById('board-temp').innerText = `--°C`; document.getElementById('board-icon').innerText = `🌤️`;
        }
    }

    function checkAutoOpenMemo(tripStartDate, dayNum, eventTime) {
        if(!eventTime) return false;
        const [y, m, d] = tripStartDate.split('-');
        const eventDate = new Date(y, m - 1, d);
        eventDate.setDate(eventDate.getDate() + (dayNum - 1));
        
        const now = new Date();
        if (now.getFullYear() === eventDate.getFullYear() && now.getMonth() === eventDate.getMonth() && now.getDate() === eventDate.getDate()) {
            const [eh, em] = eventTime.split(':').map(Number);
            const eventTotalMins = eh * 60 + em;
            const nowTotalMins = now.getHours() * 60 + now.getMinutes();
            if (nowTotalMins >= eventTotalMins - 30 && nowTotalMins <= eventTotalMins + 90) return true;
        }
        return false;
    }

    function toggleMemo(dayNum, idx) {
        const id = `${dayNum}-${idx}`;
        const memoDiv = document.getElementById(`memo-${id}`);
        if(memoDiv.style.display === 'none') {
            memoDiv.style.display = 'block';
            manuallyOpenedMemos.add(id);
            memoDiv.querySelector('textarea').focus();
        } else {
            memoDiv.style.display = 'none';
            manuallyOpenedMemos.delete(id);
        }
    }

    function renderItinerary(dayNum) {
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        if(!appData.itineraries[activeTripTitle]) return;
        const events = appData.itineraries[activeTripTitle][dayNum] || [];
        const trip = appData.trips.find(t => t.title === activeTripTitle);

        events.forEach((ev, idx) => {
            const memoText = ev.memo || '';
            const id = `${dayNum}-${idx}`;
            
            let memoDisplay = 'none';
            if (manuallyOpenedMemos.has(id) || checkAutoOpenMemo(trip.startDate, dayNum, ev.time)) {
                memoDisplay = 'block';
            }
            
            container.innerHTML += `
                <div class="timeline-card" data-idx="${idx}">
                    <div class="drag-handle">⋮⋮</div>
                    <div class="time-col"><input type="time" class="time-input" value="${ev.time}" onchange="updateEv(${dayNum}, ${idx}, 'time', this.value)"></div>
                    <div class="event-col">
                        <div class="event-title" contenteditable="true" onblur="updateEv(${dayNum}, ${idx}, 'title', this.innerText)">${ev.title}</div>
                        <div class="loc-text" contenteditable="true" onblur="updateEv(${dayNum}, ${idx}, 'loc', this.innerText)">${ev.loc}</div>
                        
                        <div class="action-row">
                            <button class="action-btn memo-btn" onclick="toggleMemo(${dayNum}, ${idx})">📝</button>
                            <button class="action-btn map-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=$${encodeURIComponent(ev.loc)}','_blank')">📍</button>
                        </div>
                        
                        <div id="memo-${id}" style="display: ${memoDisplay}; margin-top: 10px;">
                            <textarea placeholder="例如：想逛的店、必吃小吃..." onblur="updateEv(${dayNum}, ${idx}, 'memo', this.value)" style="width: 100%; padding: 10px; border: 1px dashed var(--accent-color); border-radius: 8px; font-size: 14px; background: var(--memo-bg); resize: vertical; min-height: 60px; box-sizing: border-box; font-family: inherit;">${memoText}</textarea>
                        </div>
                    </div>
                    <button onclick="delEv(${dayNum}, ${idx})" style="position:absolute; right:10px; top:15px; border:none; background:none; color:#ddd; font-size:1.2rem;">×</button>
                </div>`;
        });
        initSortable(dayNum);
    }

    function initSortable(dayNum) {
        if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(document.getElementById('itinerary-list'), { handle: '.drag-handle', animation: 150, onEnd: function(evt) {
            let events = appData.itineraries[activeTripTitle][dayNum]; const [moved] = events.splice(evt.oldIndex, 1); events.splice(evt.newIndex, 0, moved);
            saveData(); renderItinerary(dayNum);
        }});
    }

    function updateEv(d, i, f, v) { appData.itineraries[activeTripTitle][d][i][f] = v; saveData(); }
    function delEv(d, i) { if(confirm('確定刪除？')) { appData.itineraries[activeTripTitle][d].splice(i, 1); saveData(); renderItinerary(d); } }
    function addItineraryEvent() { 
        const d = document.querySelector('.date-tab.active').innerText.match(/\d+/)[0];
        if(!appData.itineraries[activeTripTitle]) appData.itineraries[activeTripTitle] = {};
        if(!appData.itineraries[activeTripTitle][d]) appData.itineraries[activeTripTitle][d] = [];
        appData.itineraries[activeTripTitle][d].push({ time: '12:00', title: '新行程', loc: '地點', memo: '' }); 
        saveData(); renderItinerary(d); 
    }

    async function fetchWeather(queryTitle) {
        try {
            const cleanQuery = queryTitle.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '').trim().split(' ')[0] || 'New York';
            const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cleanQuery)}&count=1`);
            const gd = await g.json();
            let la = 40.71, lo = -74.00;
            if(gd.results && gd.results.length > 0) { la = gd.results[0].latitude; lo = gd.results[0].longitude; }
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=16`);
            const wd = await w.json();
            weatherForecast = []; 
            for(let i=0; i<wd.daily.time.length; i++) {
                let code = wd.daily.weathercode[i], icon = (code <= 3) ? '☀️' : (code <= 69) ? '🌧️' : '🌤️';
                weatherForecast.push({ max: Math.round(wd.daily.temperature_2m_max[i]), min: Math.round(wd.daily.temperature_2m_min[i]), icon });
            }
            const active = document.querySelector('.date-tab.active'); if(active) switchDate(active.innerText.match(/\d+/)[0], active);
        } catch(e) { console.log("Weather error", e); }
    }

    function addExpense() {
        const n = document.getElementById('exp-name'), a = document.getElementById('exp-amount'), c = document.getElementById('exp-cat');
        if(!n.value || !a.value) return; appData.expenses.push({ cat: c.value, name: n.value, amt: parseFloat(a.value) });
        saveData(); renderExpenses(); n.value = ''; a.value = '';
    }
    
    function renderExpenses() {
        const cont = document.getElementById('expense-list-container'); cont.innerHTML = ''; let t = 0;
        appData.expenses.forEach((e, i) => { 
            t += e.amt; 
            cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #eee;"><div>${e.cat} ${e.name}</div><div>${currentCurrency.symbol}${e.amt} <button onclick="delExp(${i})" style="border:none; background:none; color:#ccc; font-size:1.2rem;">×</button></div></div>`; 
        });
        document.getElementById('total-twd').innerText = Math.round(t * currentCurrency.rate).toLocaleString();
    }
    function delExp(i) { if(confirm('刪除此帳目？')) { appData.expenses.splice(i, 1); saveData(); renderExpenses(); } }

    function addListObj(t, i, c) {
        const v = document.getElementById(i); if(!v.value) return;
        appData[t].push({ text: v.value, cat: c ? document.getElementById(c).value : '', checked: false });
        saveData(); v.value = ''; renderLists();
    }
    
    function renderLists() {
        document.getElementById('shopping-list-container').innerHTML = appData.shopping.map((item, i) => `<div class="list-row"><span><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('shopping',${i})"> ${item.text}</span><button class="del-item-btn" onclick="delListObj('shopping', ${i})">×</button></div>`).join('');
        
        const f = document.getElementById('food-list-container'); f.innerHTML = ''; const gf = {};
        appData.food.forEach((item, i) => { if(!gf[item.cat]) gf[item.cat] = []; item.idx = i; gf[item.cat].push(item); });
        for (const [cat, items] of Object.entries(gf)) {
            let h = `<div style="font-weight:bold; color:var(--accent-color); margin-top:10px;">${cat}</div>`;
            items.forEach(item => { h += `<div class="list-row"><span><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('food',${item.idx})"> ${item.text}</span><button class="del-item-btn" onclick="delListObj('food', ${item.idx})">×</button></div>`; });
            f.innerHTML += h;
        }

        const p = document.getElementById('packing-list-container'); p.innerHTML = ''; const gp = {};
        appData.packing.forEach((item, i) => { if(!gp[item.cat]) gp[item.cat] = []; item.idx = i; gp[item.cat].push(item); });
        for (const [cat, items] of Object.entries(gp)) {
            let h = `<div style="font-weight:bold; color:var(--accent-color); margin-top:10px;">${cat}</div>`;
            items.forEach(item => { h += `<div class="list-row"><span><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('packing',${item.idx})"> ${item.text}</span><button class="del-item-btn" onclick="delListObj('packing', ${item.idx})">×</button></div>`; });
            p.innerHTML += h;
        }
    }
    
    function delListObj(type, idx) { if(confirm('確定刪除項目？')) { appData[type].splice(idx, 1); saveData(); renderLists(); } }
    function toggleCheck(t, i) { appData[t][i].checked = !appData[t][i].checked; saveData(); renderLists(); }
    function saveSummary() { const d = document.querySelector('.date-tab.active').innerText.match(/\d+/)[0]; if(!appData.summaries[activeTripTitle]) appData.summaries[activeTripTitle] = {}; appData.summaries[activeTripTitle][d] = document.getElementById('board-summary').innerText; saveData(); }
    function switchMainTab(id, el) { document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    
    function calcExchange() { const v = document.getElementById('usd-input').value; document.getElementById('twd-result').innerText = v ? Math.round(v * currentCurrency.rate).toLocaleString() : '0'; }
    
    function saveHotelAddress() { appData.hotelAddress = document.getElementById('hotel-address').innerText; saveData(); }
    function openHotelMap() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(appData.hotelAddress)}`, '_blank'); }

    loadData();
</script>
</body>
