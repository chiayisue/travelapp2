<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Travel App 5.0 (Pro Edition)</title>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --ai-gradient: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); }
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Noto Sans TC", sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        /* 首頁與 Modal */
        #index-page { padding: 20px; display: block; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; }
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; cursor: pointer; position: relative; }
        .trip-card h2 { margin: 0 0 8px 0; font-size: 1.3rem; }
        .trip-card p { margin: 0; color: #888; font-size: 0.85rem; font-weight: bold; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--accent-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 4px 15px rgba(140, 123, 108, 0.4); z-index: 100; cursor: pointer;}
        #add-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: flex-end; }
        .modal-content { background: var(--bg-color); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px 40px 20px; box-sizing: border-box; }
        .modal-content input { width: 100%; padding: 12px; border: 1px solid var(--light-gray); border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        .btn-manual { width: 100%; padding: 14px; background: #fff; border: 1px solid var(--accent-color); color: var(--accent-color); border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #999; }

        /* 內頁容器與導航 */
        #trip-container { display: none; padding-bottom: 90px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .header-info p { margin: 4px 0 0 0; font-size: 0.8rem; color: #888; font-weight: bold; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.7rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* 共用區塊 */
        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { font-size: 1.2rem; margin: 10px 0 15px 0; color: var(--accent-color); font-weight: bold; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input, .input-group select { flex: 1; padding: 12px; border: 1px solid var(--light-gray); border-radius: 8px; font-size: 1rem; }
        button.add-btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* 列表樣式 (購物/行李) */
        .list-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .list-item input[type="checkbox"] { margin-right: 15px; transform: scale(1.3); accent-color: var(--accent-color); }
        .item-name { font-weight: bold; font-size: 0.95rem; transition: color 0.2s; }
        .checked-text { text-decoration: line-through; color: #bbb; }

        /* 記帳頁面特有 */
        .expense-total { text-align: center; font-size: 2rem; font-weight: bold; color: var(--accent-color); margin: 10px 0; }
        .expense-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .exp-cat { font-size: 0.75rem; background: var(--tab-bg); padding: 2px 6px; border-radius: 4px; margin-right: 8px; color: var(--accent-color); }

        /* 行程頁面特有 */
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tabs::-webkit-scrollbar { display: none; }
        .date-tab { min-width: 55px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; }
        .date-tab .date { font-size: 0.8rem; margin-bottom: 3px; }
        .date-tab .day { font-size: 1.1rem; font-weight: bold; }
        .date-tab.active { background: var(--accent-color); color: #fff; box-shadow: 0 4px 10px rgba(140, 123, 108, 0.3); }
        
        .daily-board { padding: 20px; background: var(--card-bg); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .board-left h2 { margin: 0 0 8px 0; font-size: 1.4rem; }
        .board-left p { margin: 0; font-size: 0.85rem; color: #666; background: var(--tab-bg); padding: 4px 10px; border-radius: 12px; display: inline-block; }
        .weather-icon { font-size: 1.8rem; line-height: 1; }
        .weather-temp { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); margin-top: 4px; }
        .weather-loc { font-size: 0.65rem; color: #aaa; }

        .day-content { display: none; }
        .day-content.active { display: block; animation: fadeIn 0.3s; }
        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; display: flex; gap: 15px; }
        .time-col { min-width: 65px; text-align: right; }
        .time-col .time { font-size: 0.9rem; font-weight: bold; }
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 15px; position: relative; flex-grow: 1; }
        .event-col::before { content: ''; width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; position: absolute; left: -5px; top: 5px; }
        .event-title { font-size: 1rem; font-weight: bold; margin: 0 0 5px 0; }
        
        /* Google Maps 連結樣式 */
        .map-link-btn { display: inline-block; font-size: 0.8rem; color: #1a73e8; text-decoration: none; background: #f1f3f4; padding: 4px 8px; border-radius: 8px; margin-top: 5px; font-weight: bold; }
        
        [contenteditable="true"] { border-bottom: 1px dashed #ccc; }
        [contenteditable="true"]:focus { background-color: #f0eadd; outline: none; }
    </style>
</head>
<body>

<div id="index-page">
    <h1 class="page-title">✈️ My Journeys</h1>
    <div id="trip-list">
        <div class="trip-card" onclick="openTrip('紐約 New York', 'APR 20 - APR 24, 2026')">
            <h2>🇺🇸 紐約 (New York)</h2><p>2026/04/20 - 04/24</p>
        </div>
    </div>
    <div class="fab" onclick="document.getElementById('add-modal').style.display='flex'">+</div>
</div>

<div id="add-modal">
    <div class="modal-content">
        <button class="close-modal" onclick="document.getElementById('add-modal').style.display='none'">×</button>
        <h2 style="margin-top:0;">建立新旅程</h2>
        <input type="text" id="new-dest" placeholder="輸入目的地 (如：東京)">
        <input type="text" id="new-date" placeholder="日期 (如：10/10 - 10/15)">
        <button class="btn-manual" onclick="createNewTrip()">手動建立空白行程</button>
    </div>
</div>

<div id="trip-container">
    <header class="trip-header">
        <div class="header-info">
            <h1 id="top-title">✈️ 紐約 New York</h1>
            <p id="top-date">APR 20 - APR 24, 2026</p>
        </div>
        <button class="back-btn" onclick="goHome()">❮ 列表</button>
    </header>

    <div id="tab-itinerary" class="main-tab-content active" style="padding-top:0;">
        <div class="date-tabs">
            <div class="date-tab active" onclick="switchDate(1, this)"><div class="date">Day 1</div><div class="day">D1</div></div>
            <div class="date-tab" onclick="switchDate(2, this)"><div class="date">Day 2</div><div class="day">D2</div></div>
            <div class="date-tab" onclick="switchDate(3, this)"><div class="date">Day 3</div><div class="day">D3</div></div>
            <div class="date-tab" onclick="switchDate(4, this)"><div class="date">Day 4</div><div class="day">D4</div></div>
            <div class="date-tab" onclick="switchDate(5, this)"><div class="date">Day 5</div><div class="day">D5</div></div>
        </div>

        <div class="daily-board">
            <div class="board-left">
                <h2 id="board-date">Day 1</h2>
                <p id="board-summary">準備出發</p>
            </div>
            <div class="board-right" id="weather-box">
                <div class="weather-icon" id="board-icon">⏳</div>
                <div class="weather-temp" id="board-temp">抓取中</div>
                <div class="weather-loc">當地天氣</div>
            </div>
        </div>

        <div id="itinerary-list"></div>
    </div>

    <div id="tab-expenses" class="main-tab-content">
        <h3 class="section-title">💰 旅途記帳本</h3>
        <div class="card" style="text-align: center; padding: 25px 15px;">
            <div style="font-size: 0.85rem; color: #888;">目前總花費 (預估台幣)</div>
            <div class="expense-total">NT$ <span id="total-twd">0</span></div>
        </div>
        
        <div class="input-group">
            <select id="exp-cat" style="flex: 0.5;">
                <option value="🍽️ 餐飲">餐飲</option>
                <option value="🛍️ 購物">購物</option>
                <option value="🚕 交通">交通</option>
                <option value="🎫 票券">票券</option>
            </select>
            <input type="text" id="exp-name" placeholder="項目名稱...">
        </div>
        <div class="input-group">
            <input type="number" id="exp-amount" placeholder="輸入當地金額 (如美金)...">
            <button class="add-btn" onclick="addExpense()">記一筆</button>
        </div>

        <div class="card" id="expense-list-container">
            </div>
    </div>

    <div id="tab-shopping" class="main-tab-content">
        <h3 class="section-title">🛒 採買清單</h3>
        <div class="input-group">
            <input type="text" id="shop-input" placeholder="想買什麼？">
            <button class="add-btn" onclick="addListObj('shopping', 'shop-input')">新增</button>
        </div>
        <div class="card" style="padding: 5px 15px;" id="shopping-list-container"></div>
    </div>

    <div id="tab-tools" class="main-tab-content">
        <h3 class="section-title">🧰 旅行助手</h3>
        <div class="card">
            <strong style="color: var(--accent-color);">💰 匯率計算機</strong>
            <div style="display: flex; align-items: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; margin: 15px 0;">
                <span style="font-size: 1.2rem; margin-right: 10px;">$</span>
                <input type="number" id="usd-input" placeholder="輸入當地金額..." oninput="calcExchange()" style="border:none; outline:none; font-size:1.2rem; width:100%;">
            </div>
            <div style="text-align: right; color: #666;">約合 <span id="twd-result" style="color: var(--accent-color); font-size: 1.6rem; font-weight: bold;">0</span> 台幣 (預設 x32.2)</div>
        </div>
    </div>

    <div id="tab-packing" class="main-tab-content">
        <h3 class="section-title">🧳 行李清單</h3>
        <div class="input-group">
            <input type="text" id="pack-input" placeholder="要帶什麼？">
            <button class="add-btn" onclick="addListObj('packing', 'pack-input')">新增</button>
        </div>
        <div class="card" style="padding: 5px 15px;" id="packing-list-container"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>行程</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>記帳</div>
        <div class="nav-item" onclick="switchMainTab('tab-shopping', this)"><span class="nav-icon">🛒</span>購物</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>工具</div>
        <div class="nav-item" onclick="switchMainTab('tab-packing', this)"><span class="nav-icon">🧳</span>行李</div>
    </nav>
</div>

<script>
    /* =========================================
       資料庫與狀態管理 (Simulated with arrays)
    ========================================= */
    let currentTrip = '';
    let weatherForecast = []; // 儲存未來 5 天天氣
    
    // 預設資料
    let appData = {
        shopping: ['紐約任天堂皮卡丘限定玩偶', 'Ricoh GR III 備用電池'],
        packing: ['護照與個人證件', '轉接頭與充電線', '薄外套 (對應溫差)'],
        expenses: []
    };

    /* =========================================
       初始化與頁面切換
    ========================================= */
    function goHome() {
        document.getElementById('trip-container').style.display = 'none';
        document.getElementById('index-page').style.display = 'block';
    }

    function openTrip(title, date) {
        currentTrip = title;
        document.getElementById('index-page').style.display = 'none';
        document.getElementById('trip-container').style.display = 'block';
        
        document.getElementById('top-title').innerText = title;
        document.getElementById('top-date').innerText = date;
        
        // 觸發天氣 API 與資料渲染
        fetchWeather(title);
        renderLists();
        
        // 預設回到 Day 1
        switchMainTab('tab-itinerary', document.querySelectorAll('.nav-item')[0]);
        switchDate(1, document.querySelectorAll('.date-tab')[0]);
        window.scrollTo(0, 0);
    }

    function switchMainTab(tabId, element) {
        document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    /* =========================================
       行程與地圖功能
    ========================================= */
    // 根據天數載入對應的行程 (這裡示範 D1 與空白天數)
    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('board-date').innerText = `Day ${dayNum}`;
        document.getElementById('board-summary').innerText = dayNum === 1 ? '準備出發' : '自由探索';
        
        // 更新天氣 (如果有抓到 API 資料)
        if(weatherForecast.length >= dayNum) {
            const w = weatherForecast[dayNum-1];
            document.getElementById('board-temp').innerText = `${w.min}°~${w.max}°`;
            document.getElementById('board-icon').innerText = w.icon;
        }

        // 動態生成行程卡片 + Google Maps 按鈕
        const container = document.getElementById('itinerary-list');
        if(currentTrip.includes('紐約') && dayNum === 1) {
            container.innerHTML = `
                <div class="timeline-card">
                    <div class="time-col"><div class="time" contenteditable="true">10:00</div></div>
                    <div class="event-col">
                        <div class="event-title" contenteditable="true">🎨 MoMA 現代藝術博物館</div>
                        <a href="https://www.google.com/maps/search/?api=1&query=MoMA+New+York" target="_blank" class="map-link-btn">🗺️ 開啟導航</a>
                    </div>
                </div>
                <div class="timeline-card">
                    <div class="time-col"><div class="time" contenteditable="true">14:00</div></div>
                    <div class="event-col">
                        <div class="event-title" contenteditable="true">Nintendo NY 旗艦店</div>
                        <a href="https://www.google.com/maps/search/?api=1&query=Nintendo+NY" target="_blank" class="map-link-btn">🗺️ 開啟導航</a>
                    </div>
                </div>
            `;
        } else {
            // 空白新增模板 (自動帶有搜尋按鈕邏輯)
            container.innerHTML = `
                <div class="timeline-card">
                    <div class="time-col"><div class="time" contenteditable="true">09:00</div></div>
                    <div class="event-col">
                        <div class="event-title" id="event-input-${dayNum}" contenteditable="true">✏️ 點擊輸入景點</div>
                        <button class="map-link-btn" onclick="searchMap('event-input-${dayNum}')" style="border:none; cursor:pointer;">🗺️ 地圖搜尋此地</button>
                    </div>
                </div>
            `;
        }
    }

    // Google Maps 搜尋器 (給手動輸入的地點使用)
    function searchMap(elementId) {
        const query = document.getElementById(elementId).innerText;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`, '_blank');
    }

    /* =========================================
       天氣 API 串接 (Open-Meteo 免費版)
    ========================================= */
    async function fetchWeather(cityStr) {
        try {
            document.getElementById('board-temp').innerText = '查詢中...';
            // 簡化城市名稱用於搜尋
            let searchCity = cityStr.includes('紐約') ? 'New York' : cityStr;
            
            // 1. 抓取經緯度
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${searchCity}&count=1`);
            const geoData = await geoRes.json();
            
            if(!geoData.results) throw new Error("找不到城市");
            const {latitude, longitude} = geoData.results[0];

            // 2. 抓取天氣預報
            const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`);
            const wxData = await wxRes.json();

            // 解析未來 5 天
            weatherForecast = [];
            for(let i=0; i<5; i++) {
                let code = wxData.daily.weathercode[i];
                let icon = '🌤️';
                if(code <= 3) icon = '☀️';
                else if(code <= 69) icon = '🌧️';
                else if(code <= 79) icon = '❄️';
                
                weatherForecast.push({
                    max: Math.round(wxData.daily.temperature_2m_max[i]),
                    min: Math.round(wxData.daily.temperature_2m_min[i]),
                    icon: icon
                });
            }
            // 重新刷新第一天的天氣顯示
            switchDate(1, document.querySelectorAll('.date-tab')[0]);

        } catch (e) {
            document.getElementById('board-temp').innerText = '無資料';
            console.log("Weather API failed: ", e);
        }
    }

    /* =========================================
       記帳功能 (Expenses)
    ========================================= */
    function addExpense() {
        const cat = document.getElementById('exp-cat').value;
        const name = document.getElementById('exp-name').value;
        const amount = parseFloat(document.getElementById('exp-amount').value);
        
        if(!name || isNaN(amount)) return alert("請輸入名稱與金額！");
        
        appData.expenses.push({ cat, name, amount });
        
        document.getElementById('exp-name').value = '';
        document.getElementById('exp-amount').value = '';
        renderExpenses();
    }

    function renderExpenses() {
        const container = document.getElementById('expense-list-container');
        container.innerHTML = '';
        let totalLocal = 0;

        appData.expenses.forEach(exp => {
            totalLocal += exp.amount;
            container.innerHTML += `
                <div class="expense-item">
                    <div><span class="exp-cat">${exp.cat}</span> ${exp.name}</div>
                    <div style="font-weight:bold;">$${exp.amount}</div>
                </div>
            `;
        });
        
        // 換算台幣 (預設 32.2)
        const totalTwd = Math.round(totalLocal * 32.2);
        document.getElementById('total-twd').innerText = totalTwd.toLocaleString('en-US');
    }

    /* =========================================
       購物與行李清單 (List Generator)
    ========================================= */
    function addListObj(type, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return;
        appData[type].push(val);
        document.getElementById(inputId).value = '';
        renderLists();
    }

    function renderLists() {
        // 渲染購物
        const shopCont = document.getElementById('shopping-list-container');
        shopCont.innerHTML = appData.shopping.map(item => `
            <div class="list-item">
                <input type="checkbox" onchange="toggleStrike(this)">
                <span class="item-name">${item}</span>
            </div>
        `).join('');

        // 渲染行李
        const packCont = document.getElementById('packing-list-container');
        packCont.innerHTML = appData.packing.map(item => `
            <div class="list-item">
                <input type="checkbox" onchange="toggleStrike(this)">
                <span class="item-name">${item}</span>
            </div>
        `).join('');
    }

    function toggleStrike(checkbox) {
        const textSpan = checkbox.nextElementSibling;
        if(checkbox.checked) textSpan.classList.add('checked-text');
        else textSpan.classList.remove('checked-text');
    }

    /* =========================================
       工具計算機與新增旅程 Modal
    ========================================= */
    function calcExchange() {
        const val = document.getElementById('usd-input').value;
        const res = document.getElementById('twd-result');
        if(val) res.innerText = Math.round(val * 32.2).toLocaleString('en-US');
        else res.innerText = '0';
    }

    function createNewTrip() {
        const dest = document.getElementById('new-dest').value || '未命名旅程';
        const date = document.getElementById('new-date').value || '日期未定';
        
        // 在首頁增加一張卡片
        const list = document.getElementById('trip-list');
        const newCard = document.createElement('div');
        newCard.className = 'trip-card';
        newCard.innerHTML = `<h2>📍 ${dest}</h2><p>${date}</p>`;
        newCard.onclick = () => openTrip(dest, date);
        list.appendChild(newCard);
        
        document.getElementById('add-modal').style.display = 'none';
    }

    // 初次載入
    renderExpenses();
</script>
</body>
</html>
