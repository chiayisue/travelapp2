<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Travel App 14.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --danger-color: #ff4d4f; }
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Noto Sans TC", sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overscroll-behavior-y: none; }
        
        /* 基礎 UI */
        #index-page { padding: 20px; display: block; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; }
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
        .trip-info h2 { margin: 0 0 8px 0; font-size: 1.3rem; }
        .trip-info p { margin: 0; color: #888; font-size: 0.85rem; font-weight: bold; }
        .delete-btn { color: #d1c9c0; background: none; border: none; cursor: pointer; padding: 8px; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--accent-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; box-shadow: 0 4px 15px rgba(140, 123, 108, 0.4); z-index: 100; cursor: pointer;}
        
        /* 內頁導航 */
        #trip-container { display: none; padding-bottom: 90px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .header-info p { margin: 4px 0 0 0; font-size: 0.8rem; color: #888; font-weight: bold; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.7rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* 行程看板 */
        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tab { min-width: 60px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; display: flex; flex-direction: column; gap: 4px;}
        .date-tab.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .daily-board { padding: 20px; background: var(--card-bg); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        
        /* 行程卡片 & 時間滾輪 */
        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; display: flex; gap: 15px; position: relative; }
        .drag-handle { color: #ccc; display: flex; align-items: center; justify-content: center; padding-right: 5px; font-size: 1.5rem; cursor: grab; touch-action: none; }
        .time-col { min-width: 85px; text-align: left; }
        .time-input { font-size: 0.95rem; font-weight: bold; color: var(--accent-color); background: var(--tab-bg); border: 1px solid var(--light-gray); border-radius: 8px; padding: 6px 8px; width: 100%; box-sizing: border-box; outline: none; cursor: pointer; text-align: center; -webkit-appearance: none; }
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 15px; position: relative; flex-grow: 1; }
        .event-col::before { content: ''; width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; position: absolute; left: -5px; top: 5px; }
        .event-title { font-size: 1rem; font-weight: bold; margin: 0 0 5px 0; }
        .loc-text { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .map-link-btn { display: inline-block; font-size: 0.8rem; color: #1a73e8; background: #f1f3f4; padding: 4px 8px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; }
        .delete-event-btn { position: absolute; right: 10px; top: 15px; }

        /* 通用元件 */
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input, .input-group select { flex: 1; padding: 12px; border: 1px solid var(--light-gray); border-radius: 8px; font-size: 1rem; }
        button.add-btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button.add-btn-secondary { background-color: var(--tab-bg); color: var(--accent-color); border: 1px dashed var(--accent-color); padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        [contenteditable="true"] { border-bottom: 1px dashed transparent; min-height: 20px; display: inline-block; width: 100%; }
        [contenteditable="true"]:focus { background-color: #f0eadd; outline: none; border-bottom: 1px dashed var(--accent-color); }
    </style>
</head>
<body>

<div id="index-page">
    <h1 class="page-title">✈️ My Journeys</h1>
    <div id="trip-list"></div>
    <div class="fab" onclick="document.getElementById('add-modal').style.display='flex'">+</div>
</div>

<div id="add-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: flex-end;">
    <div class="modal-content" style="background: var(--bg-color); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px 40px 20px;">
        <button onclick="document.getElementById('add-modal').style.display='none'" style="float:right; background:none; border:none; font-size:1.5rem;">×</button>
        <h2 style="margin-top:0;">建立新旅程</h2>
        <div class="input-group-modal" style="margin-bottom:15px;">
            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">目的地</label>
            <input type="text" id="new-dest" placeholder="輸入目的地..." style="width:100%; padding:12px; border:1px solid var(--light-gray); border-radius:10px;">
        </div>
        <div class="input-group-modal" style="margin-bottom:15px;">
            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">出發日期</label>
            <input type="date" id="new-start-date" style="width:100%; padding:12px; border:1px solid var(--light-gray); border-radius:10px;">
        </div>
        <button class="btn-manual" onclick="createNewTrip()" style="width:100%; padding:14px; background:var(--accent-color); color:white; border:none; border-radius:12px; font-weight:bold;">建立行程</button>
    </div>
</div>

<div id="trip-container">
    <header class="trip-header">
        <div class="header-info"><h1 id="top-title">載入中...</h1><p id="top-date">...</p></div>
        <button class="back-btn" onclick="goHome()">❮ 列表</button>
    </header>
    <div id="tab-itinerary" class="main-tab-content active" style="padding-top:0;">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div class="daily-board">
            <div class="board-left"><h2 id="board-date">Day 1</h2><p id="board-summary">準備出發</p></div>
            <div class="board-right" id="weather-box"><div class="weather-icon" id="board-icon">⏳</div><div class="weather-temp" id="board-temp">抓取中</div><div style="font-size:0.6rem; color:#aaa;">當地預報</div></div>
        </div>
        <div id="itinerary-list"></div>
        <button class="add-btn-secondary" onclick="addItineraryEvent()">+ 新增時段</button>
    </div>
    <div id="tab-expenses" class="main-tab-content">
        <h3 class="section-title">💰 旅途記帳本</h3>
        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; color: #888;">目前總花費 (預估台幣)</div>
            <div style="font-size: 2rem; font-weight: bold; color: var(--accent-color); margin: 10px 0;">NT$ <span id="total-twd">0</span></div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
            <div style="display: flex; gap: 10px;">
                <select id="exp-cat" style="flex: 0.8; padding: 12px; border-radius: 8px; border: 1px solid var(--light-gray); font-size: 1rem; background: #fff;">
                    <option value="🍽️ 餐飲">餐飲</option>
                    <option value="🛍️ 購物">購物</option>
                    <option value="🚕 交通">交通</option>
                    <option value="🎫 票券">票券</option>
                </select>
                <input type="text" id="exp-name" placeholder="項目名稱..." style="flex: 1.2; padding: 12px; border-radius: 8px; border: 1px solid var(--light-gray); font-size: 1rem;">
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="exp-amount" placeholder="輸入金額..." style="flex: 1.2; padding: 12px; border-radius: 8px; border: 1px solid var(--light-gray); font-size: 1rem;">
                <button class="add-btn" onclick="addExpense()" style="flex: 0.8;">新增</button>
            </div>
        </div>

        <div class="card" id="expense-list-container"></div>
    </div>
    <div id="tab-shopping" class="main-tab-content">
        <h3 class="section-title">🛒 採買清單</h3>
        <div class="input-group"><input type="text" id="shop-input" placeholder="想買什麼？"><button class="add-btn" onclick="addListObj('shopping', 'shop-input', '')">新增</button></div>
        <div class="card" id="shopping-list-container"></div>
    </div>
    <div id="tab-tools" class="main-tab-content">
        <h3 class="section-title">🧰 旅行助手</h3>
        <div class="card">
            <strong style="color: var(--accent-color);">🏨 住宿資訊</strong>
            <div contenteditable="true" style="font-weight: bold; margin: 10px 0;" id="hotel-address" onblur="saveHotelAddress()">127 E 30th St, New York, NY 10016</div>
            <button onclick="openHotelMap()" class="hotel-map-btn"><span>🗺️ 在 Google Maps 上開啟</span></button>
        </div>
        <div class="card">
            <strong style="color: var(--accent-color);">💰 匯率計算機</strong>
            <div style="display: flex; align-items: center; border-bottom: 2px solid var(--accent-color); padding: 10px 0;">
                <span style="font-size: 1.2rem; margin-right: 10px;">$</span><input type="number" id="usd-input" placeholder="USD" oninput="calcExchange()" style="border:none; outline:none; font-size:1.2rem; width:100%; background:none;">
            </div>
            <div style="text-align: right; margin-top:10px; color: #666;">約合 <span id="twd-result" style="color: var(--accent-color); font-size: 1.5rem; font-weight: bold;">0</span> 台幣</div>
        </div>
    </div>
    <div id="tab-packing" class="main-tab-content">
        <h3 class="section-title">🧳 行李清單</h3>
        <div class="input-group">
            <select id="pack-cat"><option value="必備文件">必備文件</option><option value="電子產品">電子產品</option><option value="衣物配件">衣物配件</option><option value="盥洗用品">盥洗用品</option></select>
            <input type="text" id="pack-input" placeholder="要帶什麼？">
        </div>
        <button class="add-btn" style="width:100%; margin-bottom:20px;" onclick="addListObj('packing', 'pack-input', 'pack-cat')">新增</button>
        <div class="card" id="packing-list-container"></div>
    </div>
    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>行程</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>記帳</div>
        <div class="nav-item" onclick="switchMainTab('tab-shopping', this)"><span class="nav-icon">🛒</span>購物</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>工具</div>
        <div class="nav-item" onclick="switchMainTab('tab-packing', this)"><span class="nav-icon">🧳</span>行李</div>
    </nav>
</div>

<script>
    const trashIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
    let weatherForecast = [], currentDates = [], activeTripTitle = '', sortableInstance = null;
    let appData = {
        lastOpenTrip: null, // 14.0 新增：記錄最後開啟的旅程
        hotelAddress: "127 E 30th St, New York, NY 10016",
        trips: [ { id: 1, title: '🇺🇸 紐約 (New York)', startDate: '2026-04-20' } ],
        shopping: [ { id: 1, text: '紐約任天堂皮卡丘限定玩偶', checked: false } ],
        packing: [ { id: 1, text: '護照', cat: '必備文件', checked: false }, { id: 2, text: 'I-20', cat: '必備文件', checked: false } ],
        expenses: [],
        itineraries: {}
    };

    function saveData() { localStorage.setItem('myTravelApp_V14', JSON.stringify(appData)); }
    function loadData() {
        const saved = localStorage.getItem('myTravelApp_V14');
        if (saved) { appData = JSON.parse(saved); } 
        else {
            appData.itineraries['🇺🇸 紐約 (New York)'] = {
                1: [ { time: '21:53', title: '✈️ 航班起飛 (HA 6651)', loc: 'San Francisco (SFO)' } ],
                2: [
                    { time: '06:30', title: '🛬 抵達紐華克機場', loc: 'Newark (EWR)' },
                    { time: '08:30', title: '🏨 飯店寄放行李', loc: '127 E 30th St' },
                    { time: '09:00', title: '🥯 紐約第一早餐：Best Bagel & Coffee', loc: '225 W 35th St' },
                    { time: '10:30', title: '☕ 咖啡提神：Stumptown Coffee', loc: 'Stumptown Coffee Roasters' },
                    { time: '11:30', title: '🌳 麥迪遜廣場公園散步', loc: 'Madison Square Park' },
                    { time: '13:00', title: '🏛️ 911 紀念博物館', loc: '180 Greenwich St' }
                ],
                3: [
                    { time: '09:30', title: '☕ Ralph\'s Coffee', loc: '888 Madison Ave' },
                    { time: '10:30', title: '🎨 大都會美術館 (The MET)', loc: '1000 5th Ave' },
                    { time: '14:00', title: '🌳 中央公園漫步', loc: 'Central Park' },
                    { time: '16:00', title: '🛍️ 第五大道逛街', loc: '5th Ave' },
                    { time: '17:30', title: '🍃 公園休憩：Bryant Park', loc: 'Bryant Park' },
                    { time: '19:00', title: '🎭 音樂劇：The Great Gatsby', loc: 'Broadway Theatre' }
                ],
                4: [
                    { time: '10:00', title: '☕ Devocion Coffee', loc: 'Devocion Flatiron' },
                    { time: '11:30', title: '🚶 高線公園 (High Line)', loc: 'The High Line' },
                    { time: '13:00', title: '🦞 雀兒喜市場', loc: 'Chelsea Market' },
                    { time: '18:00', title: '🍝 晚餐：Tony\'s Di Napoli', loc: '147 W 43rd St' }
                ],
                5: [
                    { time: '10:00', title: '🥯 Ess-a-Bagel 早餐', loc: '831 3rd Ave' },
                    { time: '11:30', title: '🌉 布魯克林大橋', loc: 'Brooklyn Bridge' },
                    { time: '14:30', title: '🧳 返回飯店拿行李', loc: '127 E 30th St' },
                    { time: '18:23', title: '✈️ 班機回程', loc: 'Newark (EWR)' }
                ]
            };
            saveData();
        }
    }

    function renderTrips() {
        const list = document.getElementById('trip-list'); list.innerHTML = '';
        appData.trips.forEach((trip, index) => {
            list.innerHTML += `<div class="trip-card" onclick="openTrip('${trip.title}', '${trip.startDate}')"><div class="trip-info"><h2>${trip.title}</h2><p>出發：${trip.startDate}</p></div><button class="delete-btn" onclick="deleteTrip(${index}, event)">${trashIcon}</button></div>`;
        });
    }
    function createNewTrip() {
        const dest = document.getElementById('new-dest').value || '未命名', dateStr = document.getElementById('new-start-date').value || new Date().toISOString().split('T')[0], newTitle = `📍 ${dest}`;
        appData.trips.push({ title: newTitle, startDate: dateStr }); appData.itineraries[newTitle] = { 1: [], 2: [], 3: [], 4: [], 5: [] };
        saveData(); renderTrips(); document.getElementById('add-modal').style.display = 'none';
    }
    function deleteTrip(index, event) { event.stopPropagation(); if(confirm("確定刪除？")) { appData.trips.splice(index, 1); saveData(); renderTrips(); } }
    
    // 14.0 回到首頁時清除狀態
    function goHome() { 
        appData.lastOpenTrip = null; 
        saveData();
        document.getElementById('trip-container').style.display = 'none'; 
        document.getElementById('index-page').style.display = 'block'; 
    }
    
    function openTrip(title, startDate) {
        activeTripTitle = title; 
        appData.lastOpenTrip = title; // 14.0 儲存開啟狀態
        saveData();

        document.getElementById('index-page').style.display = 'none'; 
        document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = title; 
        document.getElementById('top-date').innerText = `出發日：${startDate}`;
        
        generateDateTabs(startDate); 
        fetchWeather(title); 
        renderLists(); 
        renderExpenses();
    }

    function generateDateTabs(startDateStr) {
        const tabsContainer = document.getElementById('dynamic-date-tabs'); tabsContainer.innerHTML = ''; currentDates = [];
        const parts = startDateStr.split('-'), start = new Date(parts[0], parts[1] - 1, parts[2]), weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        for(let i=0; i<5; i++) {
            let current = new Date(start); current.setDate(start.getDate() + i);
            let mm = String(current.getMonth() + 1).padStart(2, '0'), dd = String(current.getDate()).padStart(2, '0'), displayDate = `${mm}/${dd}`, wd = weekdays[current.getDay()];
            currentDates.push(displayDate);
            tabsContainer.innerHTML += `<div class="date-tab" onclick="switchDate(${i+1}, this)"><div class="day">D${i+1}</div><div class="date">${displayDate}</div><div class="weekday">(${wd})</div></div>`;
        }
        
        // 14.0：自動偵測手機「今天」的日期，決定要開啟哪一個分頁
        const today = new Date();
        const tMm = String(today.getMonth() + 1).padStart(2, '0');
        const tDd = String(today.getDate()).padStart(2, '0');
        const todayStr = `${tMm}/${tDd}`;

        let targetDay = 1;
        let foundIdx = currentDates.indexOf(todayStr);
        if (foundIdx !== -1) {
            targetDay = foundIdx + 1; // 找到的話就跳轉到那一天
        }
        
        switchDate(targetDay, tabsContainer.children[targetDay - 1]);
    }

    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active')); if(element) element.classList.add('active');
        document.getElementById('board-date').innerText = `Day ${dayNum} (${currentDates[dayNum-1]})`;
        if(weatherForecast.length >= dayNum) { const w = weatherForecast[dayNum-1]; document.getElementById('board-temp').innerText = `${w.min}°~${w.max}°`; document.getElementById('board-icon').innerText = w.icon; }
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        let dayEvents = appData.itineraries[activeTripTitle] && appData.itineraries[activeTripTitle][dayNum] ? appData.itineraries[activeTripTitle][dayNum] : [];
        dayEvents.forEach((ev, idx) => {
            const evId = `event-${dayNum}-${idx}`;
            container.innerHTML += `
            <div class="timeline-card" data-index="${idx}">
                <div class="drag-handle">⋮⋮</div>
                <div class="time-col"><input type="time" class="time-input" value="${ev.time}" onchange="saveCurrentItinerary()"></div>
                <div class="event-col">
                    <div class="event-title" id="${evId}" contenteditable="true" onblur="saveCurrentItinerary()">${ev.title}</div>
                    <div class="loc-text" contenteditable="true" onblur="saveCurrentItinerary()">${ev.loc || ''}</div>
                    <button class="map-link-btn" onclick="searchMap('${evId}')">🗺️ Maps</button>
                </div>
                <button class="delete-btn delete-event-btn" onclick="deleteItineraryEvent(${dayNum}, ${idx})">${trashIcon}</button>
            </div>`;
        });
        initSortable(dayNum);
    }
    function initSortable(dayNum) {
        const el = document.getElementById('itinerary-list'); if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(el, { handle: '.drag-handle', animation: 150, onEnd: function (evt) {
            let events = appData.itineraries[activeTripTitle][dayNum]; const [moved] = events.splice(evt.oldIndex, 1); events.splice(evt.newIndex, 0, moved);
            recalculateTimes(dayNum); saveData(); switchDate(dayNum, document.querySelector('.date-tab.active'));
        }});
    }
    function recalculateTimes(dayNum) {
        let events = appData.itineraries[activeTripTitle][dayNum]; if(events.length <= 1) return;
        let [hrs, mins] = events[0].time.split(':').map(Number); if(isNaN(hrs)) return;
        let totalMins = hrs * 60 + mins;
        for(let i = 1; i < events.length; i++) { totalMins += 120; let newH = Math.floor(totalMins / 60) % 24, newM = totalMins % 60; events[i].time = `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`; }
    }
    function saveCurrentItinerary() {
        const day = document.querySelector('.date-tab.active .day').innerText.replace('D', '');
        const cards = document.querySelectorAll('.timeline-card');
        let data = []; cards.forEach(c => { data.push({ time: c.querySelector('.time-input').value, title: c.querySelector('.event-title').innerText, loc: c.querySelector('.loc-text').innerText }); });
        appData.itineraries[activeTripTitle][day] = data; saveData();
    }
    function addItineraryEvent() {
        const day = document.querySelector('.date-tab.active .day').innerText.replace('D', '');
        if(!appData.itineraries[activeTripTitle][day]) appData.itineraries[activeTripTitle][day] = [];
        appData.itineraries[activeTripTitle][day].push({ time: '12:00', title: '新行程', loc: '地點' }); saveData(); switchDate(day, document.querySelector('.date-tab.active'));
    }
    function deleteItineraryEvent(d, i) { if(confirm("刪除？")) { appData.itineraries[activeTripTitle][d].splice(i, 1); saveData(); switchDate(d, document.querySelector('.date-tab.active')); } }
    function searchMap(id) { 
        const loc = document.getElementById(id).nextElementSibling.innerText.trim() || document.getElementById(id).innerText;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, ''))}`, '_blank');
    }
    function saveHotelAddress() { appData.hotelAddress = document.getElementById('hotel-address').innerText; saveData(); }
    function openHotelMap() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(document.getElementById('hotel-address').innerText)}`, '_blank'); }
    async function fetchWeather(city) {
        try {
            let q = city.includes('紐約') ? 'New York' : city.replace('📍 ', '');
            const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=1`), gd = await g.json();
            const {latitude:la, longitude:lo} = gd.results[0];
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`), wd = await w.json();
            weatherForecast = []; for(let i=0; i<5; i++) {
                let code = wd.daily.weathercode[i], icon = (code <= 3) ? '☀️' : (code <= 69) ? '🌧️' : '🌤️';
                weatherForecast.push({ max: Math.round(wd.daily.temperature_2m_max[i]), min: Math.round(wd.daily.temperature_2m_min[i]), icon });
            }
            switchDate(parseInt(document.querySelector('.date-tab.active .day').innerText.replace('D','')), document.querySelector('.date-tab.active'));
        } catch (e) {}
    }
    
    // 14.0 修復輸入框不清空的問題
    function addExpense() {
        const cat = document.getElementById('exp-cat').value;
        const nameInput = document.getElementById('exp-name');
        const amtInput = document.getElementById('exp-amount');
        const name = nameInput.value;
        const amt = parseFloat(amtInput.value);
        
        if(!name || isNaN(amt)) return; 
        
        appData.expenses.push({ cat, name, amt }); 
        saveData(); 
        renderExpenses();
        
        // 成功新增後，將欄位清空
        nameInput.value = '';
        amtInput.value = '';
    }
    
    function renderExpenses() {
        const c = document.getElementById('expense-list-container'); c.innerHTML = ''; let t = 0;
        appData.expenses.forEach((e, i) => { t += e.amt; c.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #eee;"><div>${e.cat} ${e.name}</div><div>$${e.amt} <button onclick="delExp(${i})" style="border:none; background:none; color:#ccc;">${trashIcon}</button></div></div>`; });
        document.getElementById('total-twd').innerText = Math.round(t * 32.2).toLocaleString();
    }
    function delExp(i) { appData.expenses.splice(i, 1); saveData(); renderExpenses(); }
    function addListObj(t, i, c) {
        const v = document.getElementById(i).value; if(!v) return;
        appData[t].push({ id: Date.now(), text: v, cat: c ? document.getElementById(c).value : '', checked: false });
        saveData(); document.getElementById(i).value = ''; renderLists();
    }
    function renderLists() {
        document.getElementById('shopping-list-container').innerHTML = appData.shopping.map((item, i) => `<div style="padding:10px 0; border-bottom:1px solid #eee;"><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('shopping',${i})"> ${item.text}</div>`).join('');
        const p = document.getElementById('packing-list-container'); p.innerHTML = ''; const g = {};
        appData.packing.forEach((item, i) => { if(!g[item.cat]) g[item.cat] = []; item.idx = i; g[item.cat].push(item); });
        for (const [cat, items] of Object.entries(g)) {
            let h = `<div style="font-weight:bold; color:var(--accent-color); margin-top:15px;">${cat}</div>`;
            items.forEach(item => { h += `<div style="padding:10px 0; border-bottom:1px solid #eee;"><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('packing',${item.idx})"> ${item.text}</div>`; });
            p.innerHTML += h;
        }
    }
    function toggleCheck(t, i) { appData[t][i].checked = !appData[t][i].checked; saveData(); renderLists(); }
    function switchMainTab(id, el) { document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function calcExchange() { const v = document.getElementById('usd-input').value; document.getElementById('twd-result').innerText = v ? Math.round(v * 32.2).toLocaleString() : '0'; }
    
    // 啟動 App
    loadData(); 
    renderTrips();
    
    // 14.0 自動開啟上次未關閉的旅程
    if (appData.lastOpenTrip) {
        const trip = appData.trips.find(t => t.title === appData.lastOpenTrip);
        if (trip) {
            openTrip(trip.title, trip.startDate);
        }
    }
</script>
</body>
</html>
