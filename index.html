<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NY Travel App 22.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --danger-color: #ff4d4f; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overscroll-behavior-y: none; }
        
        #index-page { padding: 20px; display: block; padding-bottom: 100px; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; }
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
        .trip-info h2 { margin: 0 0 8px 0; font-size: 1.2rem; }
        .trip-info p { margin: 0; color: #888; font-size: 0.8rem; font-weight: bold; }
        
        #trip-container { display: none; padding-bottom: 90px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.7rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; }
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tab { min-width: 60px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; }
        .date-tab.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; gap: 12px; }
        .time-col { min-width: 75px; }
        .time-input { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); border: none; background: var(--tab-bg); border-radius: 6px; padding: 4px; width: 100%; text-align: center; }
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 12px; flex-grow: 1; }
        .event-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 4px; }
        .loc-text { font-size: 0.75rem; color: #888; }
        .map-link-btn { font-size: 0.7rem; color: #1a73e8; background: #f1f3f4; padding: 3px 6px; border-radius: 6px; border: none; margin-top: 6px; cursor: pointer; }
        .delete-btn { color: #ccc; background: none; border: none; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div id="index-page">
    <h1 class="page-title">✈️ My Journeys</h1>
    <div id="trip-list"></div>
</div>

<div id="trip-container">
    <header class="trip-header">
        <div class="header-info"><h1 id="top-title">Loading...</h1><p id="top-date">...</p></div>
        <button class="back-btn" onclick="goHome()">❮ Home</button>
    </header>
    <div id="tab-itinerary" class="main-tab-content active">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div id="itinerary-list"></div>
        <button onclick="addItineraryEvent()" style="width:100%; padding:12px; border:1px dashed var(--accent-color); background:none; color:var(--accent-color); border-radius:8px; font-weight:bold; margin-top:10px;">+ Add Event</button>
    </div>
    <div id="tab-expenses" class="main-tab-content">
        <h3 style="color: var(--accent-color);">💰 Expenses</h3>
        <div class="card" id="expense-list-container"></div>
    </div>
    <div id="tab-tools" class="main-tab-content">
        <h3 style="color: var(--accent-color);">🧰 Tools</h3>
        <div class="card"><strong>🏨 Hotel Address</strong><div contenteditable="true" id="hotel-address" style="margin: 10px 0; font-size:0.9rem;">127 E 30th St, New York, NY 10016</div><button onclick="openHotelMap()" style="width:100%; padding:10px; border:none; border-radius:8px; background:#e8f0fe; color:#1a73e8; font-weight:bold;">Open in Maps</button></div>
    </div>
    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>Plan</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>Spend</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>Tools</div>
    </nav>
</div>

<script>
    let activeTripTitle = '';
    let appData = { lastOpenTrip: null, itineraries: {} };

    function saveData() { localStorage.setItem('myTravelApp_V22', JSON.stringify(appData)); }
    function loadData() {
        const saved = localStorage.getItem('myTravelApp_V22');
        if (saved) { appData = JSON.parse(saved); } 
        else {
            appData.itineraries['🇺🇸 New York Trip'] = {
                1: [{ time: '21:53', title: 'Flight Departure', loc: 'SFO Airport' }],
                2: [
                    { time: '08:30', title: 'Hotel Luggage Drop-off', loc: '127 E 30th St' },
                    { time: '09:15', title: 'Breakfast: Best Bagel & Coffee', loc: '225 W 35th St' },
                    { time: '11:00', title: 'Coffee: Stumptown Coffee', loc: '18 W 29th St' },
                    { time: '13:00', title: '9/11 Memorial & Museum', loc: '180 Greenwich St' },
                    { time: '16:00', title: 'The Oculus & Westfield', loc: 'The Oculus' },
                    { time: '19:00', title: 'Dinner: OKDONGSIK', loc: '13 E 30th St' }
                ],
                3: [
                    { time: '09:30', title: 'Coffee: Ground Central Coffee Co.', loc: '28 E 28th St' },
                    { time: '11:00', title: 'The Metropolitan Museum of Art (MET)', loc: '1000 5th Ave' },
                    { time: '14:30', title: 'Central Park Stroll', loc: 'Central Park' },
                    { time: '17:15', title: 'Dinner: Danji (Reservation)', loc: '346 W 52nd St' },
                    { time: '19:00', title: 'Broadway: The Great Gatsby', loc: 'Broadway Theatre' }
                ],
                4: [
                    { time: '10:00', title: 'Coffee: Devoción', loc: '25 E 20th St' },
                    { time: '11:30', title: 'The High Line', loc: 'High Line Park' },
                    { time: '13:00', title: 'Chelsea Market (Lunch)', loc: '75 9th Ave' },
                    { time: '16:00', title: 'West Village Exploration', loc: 'West Village' },
                    { time: '18:30', title: 'Dinner: Tony\'s Di Napoli', loc: '147 W 43rd St' }
                ],
                5: [
                    { time: '09:00', title: 'Breakfast: Ess-a-Bagel', loc: '831 3rd Ave' },
                    { time: '11:00', title: 'Brooklyn Bridge', loc: 'Brooklyn Bridge' },
                    { time: '15:00', title: 'Head to JFK/EWR Airport', loc: 'NYC' }
                ]
            };
            saveData();
        }
    }

    function renderTrips() {
        const list = document.getElementById('trip-list');
        list.innerHTML = `<div class="trip-card" onclick="openTrip('🇺🇸 New York Trip', '2026-04-20')"><div class="trip-info"><h2>🇺🇸 New York Trip</h2><p>Starts: 2026-04-20</p></div></div>`;
    }

    function openTrip(title, startDate) {
        activeTripTitle = title;
        document.getElementById('index-page').style.display = 'none';
        document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = title;
        generateDateTabs(startDate);
    }

    function generateDateTabs(startDateStr) {
        const tabsContainer = document.getElementById('dynamic-date-tabs');
        tabsContainer.innerHTML = '';
        for(let i=1; i<=5; i++) {
            tabsContainer.innerHTML += `<div class="date-tab" onclick="switchDate(${i}, this)">Day ${i}</div>`;
        }
        switchDate(1, tabsContainer.firstChild);
    }

    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
        if(element) element.classList.add('active');
        const container = document.getElementById('itinerary-list');
        container.innerHTML = '';
        const events = appData.itineraries[activeTripTitle][dayNum] || [];
        events.forEach((ev, idx) => {
            container.innerHTML += `<div class="timeline-card">
                <div class="time-col"><input type="time" class="time-input" value="${ev.time}" onchange="saveItem(${dayNum}, ${idx}, 'time', this.value)"></div>
                <div class="event-col">
                    <div class="event-title" contenteditable="true" onblur="saveItem(${dayNum}, ${idx}, 'title', this.innerText)">${ev.title}</div>
                    <div class="loc-text" contenteditable="true" onblur="saveItem(${dayNum}, ${idx}, 'loc', this.innerText)">${ev.loc}</div>
                    <button class="map-link-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.loc || ev.title)}','_blank')">🗺️ Maps</button>
                </div>
            </div>`;
        });
    }

    function saveItem(day, idx, field, val) { appData.itineraries[activeTripTitle][day][idx][field] = val; saveData(); }
    function goHome() { document.getElementById('trip-container').style.display = 'none'; document.getElementById('index-page').style.display = 'block'; }
    function switchMainTab(id, el) { document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function openHotelMap() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(document.getElementById('hotel-address').innerText)}`, '_blank'); }

    loadData(); renderTrips();
</script>
</body>
</html>
