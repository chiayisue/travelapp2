<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NY Travel App 23.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --accent-color: #8c7b6c; --text-color: #4a4a4a; --light-gray: #e0e0e0; --tab-bg: #f0eadd; --danger-color: #ff4d4f; }
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Noto Sans TC", -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; overscroll-behavior-y: none; }
        
        #index-page { padding: 20px; display: block; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-title { font-size: 1.8rem; margin: 10px 0 20px 0; letter-spacing: 1px; }
        .trip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
        
        #trip-container { display: none; padding-bottom: 90px; }
        .trip-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background-color: var(--bg-color); z-index: 90; }
        .header-info h1 { margin: 0; font-size: 1.4rem; }
        .back-btn { background: #fff; border: 1px solid var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent-color); cursor: pointer;}
        
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--light-gray); padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;}
        .nav-item { text-align: center; font-size: 0.7rem; color: #999; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .main-tab-content { display: none; padding: 0 20px 20px 20px; }
        .main-tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .date-tabs { display: flex; overflow-x: auto; padding: 10px 0; gap: 12px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .date-tab { min-width: 65px; text-align: center; padding: 10px 5px; border-radius: 14px; background: var(--card-bg); border: 1px solid #eee; cursor: pointer; color: #888; display: flex; flex-direction: column; gap: 4px;}
        .date-tab.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        .daily-board { padding: 20px; background: var(--card-bg); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .weather-icon { font-size: 1.5rem; }
        .weather-temp { font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .timeline-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; gap: 15px; position: relative; }
        .drag-handle { color: #ccc; cursor: grab; display: flex; align-items: center; font-size: 1.2rem; }
        .time-col { min-width: 80px; }
        .time-input { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); border: 1px solid var(--light-gray); background: var(--tab-bg); border-radius: 6px; padding: 4px; width: 100%; text-align: center; }
        .event-col { border-left: 2px solid var(--accent-color); padding-left: 15px; flex-grow: 1; }
        .event-title { font-size: 1rem; font-weight: bold; margin-bottom: 4px; }
        .loc-text { font-size: 0.8rem; color: #888; }
        .map-link-btn { font-size: 0.75rem; color: #1a73e8; background: #f1f3f4; padding: 4px 8px; border-radius: 6px; border: none; margin-top: 8px; cursor: pointer; font-weight: bold;}
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; }
        input, select { flex: 1; padding: 12px; border: 1px solid var(--light-gray); border-radius: 8px; font-size: 1rem; }
        .add-btn { background: var(--accent-color); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        [contenteditable="true"]:focus { outline: none; background: #fffcf5; border-bottom: 1px dashed var(--accent-color); }
    </style>
</head>
<body>

<div id="index-page">
    <h1 class="page-title">✈️ My Journeys</h1>
    <div id="trip-list"></div>
</div>

<div id="trip-container">
    <header class="trip-header">
        <div class="header-info"><h1 id="top-title">...</h1><p id="top-date">...</p></div>
        <button class="back-btn" onclick="goHome()">❮ Home</button>
    </header>

    <div id="tab-itinerary" class="main-tab-content active">
        <div class="date-tabs" id="dynamic-date-tabs"></div>
        <div class="daily-board">
            <div class="board-left"><h2 id="board-date">Day 1</h2><p id="board-summary">New York, US</p></div>
            <div class="board-right" style="text-align: right;">
                <div class="weather-icon" id="board-icon">☀️</div>
                <div class="weather-temp" id="board-temp">--°C</div>
                <div style="font-size: 0.6rem; color: #aaa;">Local Forecast</div>
            </div>
        </div>
        <div id="itinerary-list"></div>
        <button onclick="addItineraryEvent()" style="width:100%; padding:15px; border:1px dashed var(--accent-color); background:none; color:var(--accent-color); border-radius:12px; font-weight:bold; margin-top:10px;">+ Add New Event</button>
    </div>

    <div id="tab-expenses" class="main-tab-content">
        <h3 style="color: var(--accent-color);">💰 Trip Expenses</h3>
        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; color: #888;">Total (Approx. TWD)</div>
            <div style="font-size: 2.2rem; font-weight: bold; color: var(--accent-color);">NT$ <span id="total-twd">0</span></div>
        </div>
        <div class="input-group">
            <div class="input-row">
                <select id="exp-cat"><option value="🍽️ Food">Food</option><option value="🛍️ Shop">Shop</option><option value="🚕 Trans">Trans</option><option value="🎫 Ticket">Ticket</option></select>
                <input type="text" id="exp-name" placeholder="Item Name...">
            </div>
            <div class="input-row">
                <input type="number" id="exp-amount" placeholder="Amount (USD)...">
                <button class="add-btn" onclick="addExpense()" style="flex: 0.5;">Add</button>
            </div>
        </div>
        <div class="card" id="expense-list-container"></div>
    </div>

    <div id="tab-lists" class="main-tab-content">
        <h3 style="color: var(--accent-color);">🛒 Shopping List</h3>
        <div class="input-row" style="margin-bottom: 20px;"><input type="text" id="shop-input" placeholder="What to buy?"><button class="add-btn" onclick="addListObj('shopping', 'shop-input', '')">Add</button></div>
        <div class="card" id="shopping-list-container"></div>

        <h3 style="color: var(--accent-color);">🧳 Packing List</h3>
        <div class="input-group">
            <select id="pack-cat"><option value="Essential">Essential</option><option value="Electronics">Electronics</option><option value="Clothes">Clothes</option></select>
            <div class="input-row"><input type="text" id="pack-input" placeholder="What to pack?"><button class="add-btn" onclick="addListObj('packing', 'pack-input', 'pack-cat')">Add</button></div>
        </div>
        <div class="card" id="packing-list-container"></div>
    </div>

    <div id="tab-tools" class="main-tab-content">
        <h3 style="color: var(--accent-color);">🧰 Travel Tools</h3>
        <div class="card">
            <strong>🏨 Hotel Address</strong>
            <div contenteditable="true" id="hotel-address" style="margin: 15px 0; font-weight: bold;" onblur="saveHotelAddress()">127 E 30th St, New York, NY 10016</div>
            <button onclick="openHotelMap()" style="width:100%; padding:12px; border:none; border-radius:10px; background:#e8f0fe; color:#1a73e8; font-weight:bold;">View in Google Maps</button>
        </div>
        <div class="card">
            <strong>💰 Currency Converter</strong>
            <div style="display: flex; align-items: center; border-bottom: 2px solid var(--accent-color); padding: 10px 0;">
                <span style="font-size: 1.5rem; margin-right: 10px;">$</span>
                <input type="number" id="usd-input" placeholder="USD" oninput="calcExchange()" style="border:none; outline:none; font-size:1.5rem; width:100%; background:none;">
            </div>
            <div style="text-align: right; margin-top:15px; color: #666;">≈ <span id="twd-result" style="color: var(--accent-color); font-size: 1.8rem; font-weight: bold;">0</span> TWD</div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchMainTab('tab-itinerary', this)"><span class="nav-icon">📍</span>Plan</div>
        <div class="nav-item" onclick="switchMainTab('tab-expenses', this)"><span class="nav-icon">💰</span>Spend</div>
        <div class="nav-item" onclick="switchMainTab('tab-lists', this)"><span class="nav-icon">🛒</span>Lists</div>
        <div class="nav-item" onclick="switchMainTab('tab-tools', this)"><span class="nav-icon">🧰</span>Tools</div>
    </nav>
</div>

<script>
    let activeTripTitle = '';
    let weatherForecast = [];
    let currentDates = [];
    let sortableInstance = null;
    let appData = {
        lastOpenTrip: null,
        hotelAddress: "127 E 30th St, New York, NY 10016",
        trips: [{ title: '🇺🇸 New York 2026', startDate: '2026-04-20' }],
        shopping: [{ text: 'Nintendo Store Pikachu', checked: false }],
        packing: [{ text: 'Passport', cat: 'Essential', checked: false }, { text: 'Ricoh GR III', cat: 'Electronics', checked: false }],
        expenses: [],
        itineraries: {}
    };

    function saveData() { localStorage.setItem('myTravelApp_V23', JSON.stringify(appData)); }
    function loadData() {
        const saved = localStorage.getItem('myTravelApp_V23');
        if (saved) { appData = JSON.parse(saved); } 
        else {
            appData.itineraries['🇺🇸 New York 2026'] = {
                1: [{ time: '21:53', title: 'Flight Departure (SFO)', loc: 'San Francisco Airport' }],
                2: [
                    { time: '08:30', title: 'Hotel Luggage Drop-off', loc: '127 E 30th St' },
                    { time: '09:15', title: 'Breakfast: Best Bagel & Coffee', loc: '225 W 35th St' },
                    { time: '11:00', title: 'Coffee: Stumptown Coffee', loc: '18 W 29th St' },
                    { time: '13:00', title: '9/11 Memorial & Museum', loc: '180 Greenwich St' },
                    { time: '16:30', title: 'Oculus & Brookfield Place (Sunset)', loc: 'The Oculus' },
                    { time: '19:30', title: 'Dinner: OKDONGSIK (Soup Rice)', loc: '13 E 30th St' }
                ],
                3: [
                    { time: '09:00', title: 'Coffee: Ground Central (NoMad)', loc: '28 E 28th St' },
                    { time: '10:30', title: 'The Metropolitan Museum of Art', loc: '1000 5th Ave' },
                    { time: '14:30', title: 'Central Park Walk', loc: 'Central Park' },
                    { time: '16:30', title: 'Bryant Park Relaxation', loc: 'Bryant Park' },
                    { time: '17:15', title: 'Dinner: Danji (Reservation)', loc: '346 W 52nd St' },
                    { time: '19:00', title: 'Broadway: The Great Gatsby', loc: 'Broadway Theatre' }
                ],
                4: [
                    { time: '10:00', title: 'Coffee: Devoción (Williamsburg)', loc: '69 Grand St' },
                    { time: '11:30', title: 'Domino Park & Waterfront', loc: '15 River St' },
                    { time: '13:30', title: 'Chelsea Market & High Line', loc: '75 9th Ave' },
                    { time: '16:30', title: 'West Village Exploration', loc: 'West Village' },
                    { time: '18:30', title: 'Dinner: Tony\'s Di Napoli (Meet friends)', loc: '147 W 43rd St' }
                ],
                5: [
                    { time: '09:30', title: 'Breakfast: Ess-a-Bagel', loc: '831 3rd Ave' },
                    { time: '11:30', title: 'Brooklyn Bridge Walk', loc: 'Brooklyn Bridge' },
                    { time: '14:30', title: 'Pick up luggage & Airport', loc: '127 E 30th St' }
                ]
            };
            saveData();
        }
    }

    function renderTrips() {
        const list = document.getElementById('trip-list'); list.innerHTML = '';
        appData.trips.forEach(trip => {
            list.innerHTML += `<div class="trip-card" onclick="openTrip('${trip.title}', '${trip.startDate}')"><div class="trip-info"><h2>${trip.title}</h2><p>Starts: ${trip.startDate}</p></div><span style="color:#ccc;">❯</span></div>`;
        });
    }

    function openTrip(title, startDate) {
        activeTripTitle = title; appData.lastOpenTrip = title; saveData();
        document.getElementById('index-page').style.display = 'none';
        document.getElementById('trip-container').style.display = 'block';
        document.getElementById('top-title').innerText = title;
        document.getElementById('top-date').innerText = `Start Date: ${startDate}`;
        generateDateTabs(startDate); fetchWeather('New York'); renderLists(); renderExpenses();
    }

    function goHome() { appData.lastOpenTrip = null; saveData(); document.getElementById('trip-container').style.display = 'none'; document.getElementById('index-page').style.display = 'block'; }

    function generateDateTabs(startDateStr) {
        const container = document.getElementById('dynamic-date-tabs'); container.innerHTML = ''; currentDates = [];
        const parts = startDateStr.split('-'), start = new Date(parts[0], parts[1]-1, parts[2]);
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        for(let i=0; i<5; i++) {
            let current = new Date(start); current.setDate(start.getDate() + i);
            let mm = String(current.getMonth() + 1).padStart(2, '0'), dd = String(current.getDate()).padStart(2, '0'), displayDate = `${mm}/${dd}`;
            currentDates.push(displayDate);
            container.innerHTML += `<div class="date-tab" onclick="switchDate(${i+1}, this)"><div style="font-size:0.8rem; font-weight:bold;">Day ${i+1}</div><div>${displayDate}</div><div style="font-size:0.6rem;">(${weekdays[current.getDay()]})</div></div>`;
        }
        const todayStr = `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`;
        let target = currentDates.indexOf(todayStr); target = (target === -1) ? 1 : target + 1;
        switchDate(target, container.children[target-1]);
    }

    function switchDate(dayNum, element) {
        document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active')); if(element) element.classList.add('active');
        document.getElementById('board-date').innerText = `Day ${dayNum} (${currentDates[dayNum-1]})`;
        if(weatherForecast[dayNum-1]) {
            document.getElementById('board-temp').innerText = `${weatherForecast[dayNum-1].min}°~${weatherForecast[dayNum-1].max}°`;
            document.getElementById('board-icon').innerText = weatherForecast[dayNum-1].icon;
        }
        renderItinerary(dayNum);
    }

    function renderItinerary(dayNum) {
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        const events = appData.itineraries[activeTripTitle][dayNum] || [];
        events.forEach((ev, idx) => {
            container.innerHTML += `<div class="timeline-card" data-idx="${idx}">
                <div class="drag-handle">⋮⋮</div>
                <div class="time-col"><input type="time" class="time-input" value="${ev.time}" onchange="updateEv(${dayNum}, ${idx}, 'time', this.value)"></div>
                <div class="event-col">
                    <div class="event-title" contenteditable="true" onblur="updateEv(${dayNum}, ${idx}, 'title', this.innerText)">${ev.title}</div>
                    <div class="loc-text" contenteditable="true" onblur="updateEv(${dayNum}, ${idx}, 'loc', this.innerText)">${ev.loc}</div>
                    <button class="map-link-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.loc)}','_blank')">🗺️ Maps</button>
                </div>
                <button onclick="delEv(${dayNum}, ${idx})" style="position:absolute; right:10px; top:15px; border:none; background:none; color:#ddd;">×</button>
            </div>`;
        });
        initSortable(dayNum);
    }

    function initSortable(dayNum) {
        if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(document.getElementById('itinerary-list'), { handle: '.drag-handle', animation: 150, onEnd: function(evt) {
            let events = appData.itineraries[activeTripTitle][dayNum]; const [moved] = events.splice(evt.oldIndex, 1); events.splice(evt.newIndex, 0, moved);
            saveData(); renderItinerary(dayNum);
        }});
    }

    function updateEv(d, i, f, v) { appData.itineraries[activeTripTitle][d][i][f] = v; saveData(); }
    function delEv(d, i) { if(confirm('Delete?')) { appData.itineraries[activeTripTitle][d].splice(i, 1); saveData(); renderItinerary(d); } }
    function addItineraryEvent() { 
        const d = document.querySelector('.date-tab.active').innerText.match(/\d+/)[0];
        appData.itineraries[activeTripTitle][d].push({ time: '12:00', title: 'New Event', loc: 'Location' }); 
        saveData(); renderItinerary(d); 
    }

    async function fetchWeather(city) {
        try {
            const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`), gd = await g.json();
            const {latitude:la, longitude:lo} = gd.results[0];
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`), wd = await w.json();
            weatherForecast = []; for(let i=0; i<5; i++) {
                let code = wd.daily.weathercode[i], icon = (code <= 3) ? '☀️' : (code <= 69) ? '🌧️' : '🌤️';
                weatherForecast.push({ max: Math.round(wd.daily.temperature_2m_max[i]), min: Math.round(wd.daily.temperature_2m_min[i]), icon });
            }
            const active = document.querySelector('.date-tab.active'); if(active) switchDate(active.innerText.match(/\d+/)[0], active);
        } catch(e) { console.error(e); }
    }

    function addExpense() {
        const n = document.getElementById('exp-name'), a = document.getElementById('exp-amount'), c = document.getElementById('exp-cat');
        if(!n.value || !a.value) return; appData.expenses.push({ cat: c.value, name: n.value, amt: parseFloat(a.value) });
        saveData(); renderExpenses(); n.value = ''; a.value = '';
    }
    function renderExpenses() {
        const cont = document.getElementById('expense-list-container'); cont.innerHTML = ''; let t = 0;
        appData.expenses.forEach((e, i) => { t += e.amt; cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #eee;"><div>${e.cat} ${e.name}</div><div>$${e.amt} <button onclick="delExp(${i})" style="border:none; background:none; color:#ccc;">${trashIcon}</button></div></div>`; });
        document.getElementById('total-twd').innerText = Math.round(t * 32.2).toLocaleString();
    }
    function delExp(i) { appData.expenses.splice(i, 1); saveData(); renderExpenses(); }

    function addListObj(t, i, c) {
        const v = document.getElementById(i); if(!v.value) return;
        appData[t].push({ text: v.value, cat: c ? document.getElementById(c).value : '', checked: false });
        saveData(); v.value = ''; renderLists();
    }
    function renderLists() {
        document.getElementById('shopping-list-container').innerHTML = appData.shopping.map((item, i) => `<div style="padding:10px 0; border-bottom:1px solid #eee;"><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('shopping',${i})"> ${item.text}</div>`).join('');
        const p = document.getElementById('packing-list-container'); p.innerHTML = ''; const g = {};
        appData.packing.forEach((item, i) => { if(!g[item.cat]) g[item.cat] = []; item.idx = i; g[item.cat].push(item); });
        for (const [cat, items] of Object.entries(g)) {
            let h = `<div style="font-weight:bold; color:var(--accent-color); margin-top:10px;">${cat}</div>`;
            items.forEach(item => { h += `<div style="padding:10px 0; border-bottom:1px solid #eee;"><input type="checkbox" ${item.checked?'checked':''} onchange="toggleCheck('packing',${item.idx})"> ${item.text}</div>`; });
            p.innerHTML += h;
        }
    }
    function toggleCheck(t, i) { appData[t][i].checked = !appData[t][i].checked; saveData(); renderLists(); }

    function switchMainTab(id, el) { document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function calcExchange() { const v = document.getElementById('usd-input').value; document.getElementById('twd-result').innerText = v ? Math.round(v * 32.2).toLocaleString() : '0'; }
    function saveHotelAddress() { appData.hotelAddress = document.getElementById('hotel-address').innerText; saveData(); }
    function openHotelMap() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(appData.hotelAddress)}`, '_blank'); }

    loadData(); renderTrips();
    if(appData.lastOpenTrip) {
        const t = appData.trips.find(x => x.title === appData.lastOpenTrip);
        if(t) openTrip(t.title, t.startDate);
    }
</script>
</body>
</html>
